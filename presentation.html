<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SCADA Water Management Presentation</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0a2342 0%, #1e5f74 100%);
            color: #ffffff;
            overflow: hidden;
            height: 100vh;
        }

        .presentation-container {
            width: 100vw;
            height: 100vh;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        /* Header with tech pattern */
        .header {
            background: rgba(10, 35, 66, 0.9);
            border-bottom: 3px solid #00d9ff;
            padding: 15px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 4px 20px rgba(0, 217, 255, 0.3);
        }

        .header-title {
            font-size: 1.2em;
            font-weight: 300;
            letter-spacing: 2px;
            color: #00d9ff;
            text-transform: uppercase;
        }

        .slide-counter {
            font-size: 1em;
            color: #4fc3f7;
            font-weight: 300;
            background: rgba(0, 217, 255, 0.1);
            padding: 5px 15px;
            border-radius: 20px;
            border: 1px solid #00d9ff;
        }

        /* Main slide area */
        .slide-container {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 60px 100px;
            position: relative;
            background: 
                radial-gradient(circle at 20% 80%, rgba(0, 217, 255, 0.1) 0%, transparent 50%),
                radial-gradient(circle at 80% 20%, rgba(79, 195, 247, 0.1) 0%, transparent 50%);
        }

        .slide {
            display: none;
            width: 100%;
            max-width: 1400px;
            animation: slideIn 0.5s ease-out;
        }

        .slide.active {
            display: block;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateX(50px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        /* Typography */
        .slide h1 {
            font-size: 3.5em;
            margin-bottom: 20px;
            color: #00d9ff;
            text-shadow: 0 0 20px rgba(0, 217, 255, 0.5);
            font-weight: 700;
            line-height: 1.2;
        }

        .slide h2 {
            font-size: 2.2em;
            margin-bottom: 30px;
            color: #4fc3f7;
            font-weight: 400;
            line-height: 1.3;
        }

        .slide h3 {
            font-size: 1.8em;
            margin: 25px 0 15px 0;
            color: #81d4fa;
            font-weight: 600;
        }

        .slide p {
            font-size: 1.4em;
            line-height: 1.8;
            margin-bottom: 20px;
            color: #e0f7fa;
        }

        .slide ul, .slide ol {
            margin: 20px 0 20px 40px;
            font-size: 1.3em;
            line-height: 1.9;
        }

        .slide li {
            margin-bottom: 15px;
            color: #b3e5fc;
        }

        .slide strong {
            color: #00d9ff;
            font-weight: 600;
        }

        /* Special styling for bullet points */
        .slide ul li::marker {
            color: #00d9ff;
        }

        /* Code blocks */
        .slide code {
            background: rgba(0, 217, 255, 0.1);
            padding: 2px 8px;
            border-radius: 4px;
            color: #4fc3f7;
            font-family: 'Courier New', monospace;
        }

        /* Images - Two column layout */
        .slide img {
            float: right;
            max-width: 40%;
            max-height: 70vh;
            width: auto;
            height: auto;
            margin: 0 0 20px 30px;
            border-radius: 10px;
            box-shadow: 0 8px 30px rgba(0, 217, 255, 0.4);
            border: 2px solid rgba(0, 217, 255, 0.3);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            object-fit: contain;
        }

        .slide img:hover {
            transform: scale(1.05);
            box-shadow: 0 12px 40px rgba(0, 217, 255, 0.6);
        }

        /* Content wrapper for slides with images */
        .slide-content {
            overflow: auto;
            width: 100%;
        }

        /* Text content adjusts when image is present */
        .slide:has(img) h1,
        .slide:has(img) h2,
        .slide:has(img) h3,
        .slide:has(img) p,
        .slide:has(img) ul,
        .slide:has(img) ol {
            max-width: 55%;
            margin-right: auto;
        }

        /* Clear floats after slide content */
        .slide::after {
            content: '';
            display: table;
            clear: both;
        }

        /* Navigation */
        .nav-button {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(0, 217, 255, 0.2);
            border: 2px solid #00d9ff;
            color: #00d9ff;
            font-size: 2em;
            padding: 20px 30px;
            cursor: pointer;
            transition: all 0.3s ease;
            z-index: 10;
            border-radius: 10px;
            backdrop-filter: blur(10px);
        }

        .nav-button:hover {
            background: rgba(0, 217, 255, 0.4);
            box-shadow: 0 0 20px rgba(0, 217, 255, 0.6);
            transform: translateY(-50%) scale(1.1);
        }

        .nav-button:active {
            transform: translateY(-50%) scale(0.95);
        }

        .nav-button.prev {
            left: 30px;
        }

        .nav-button.next {
            right: 30px;
        }

        /* Progress bar */
        .progress-bar {
            position: absolute;
            bottom: 0;
            left: 0;
            height: 5px;
            background: #00d9ff;
            transition: width 0.3s ease;
            box-shadow: 0 0 10px rgba(0, 217, 255, 0.8);
        }

        /* Loading indicator */
        .loading {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 2em;
            color: #00d9ff;
            text-align: center;
        }

        .loading::after {
            content: '';
            display: block;
            width: 50px;
            height: 50px;
            margin: 20px auto;
            border: 5px solid rgba(0, 217, 255, 0.3);
            border-top-color: #00d9ff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Keyboard shortcuts hint */
        .shortcuts-hint {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 217, 255, 0.1);
            padding: 10px 20px;
            border-radius: 20px;
            border: 1px solid rgba(0, 217, 255, 0.3);
            font-size: 0.9em;
            color: #4fc3f7;
            opacity: 0.7;
            transition: opacity 0.3s;
        }

        .shortcuts-hint:hover {
            opacity: 1;
        }

        /* Responsive design */
        @media (max-width: 1200px) {
            .slide-container {
                padding: 40px 60px;
            }

            .slide h1 {
                font-size: 2.8em;
            }

            .slide h2 {
                font-size: 1.8em;
            }

            .slide p, .slide li {
                font-size: 1.2em;
            }

            .slide img {
                max-width: 45%;
            }

            .slide:has(img) h1,
            .slide:has(img) h2,
            .slide:has(img) h3,
            .slide:has(img) p,
            .slide:has(img) ul,
            .slide:has(img) ol {
                max-width: 50%;
            }
        }

        @media (max-width: 768px) {
            .slide-container {
                padding: 20px 30px;
            }

            .slide h1 {
                font-size: 2em;
            }

            .slide h2 {
                font-size: 1.5em;
            }

            .nav-button {
                padding: 15px 20px;
                font-size: 1.5em;
            }

            /* Stack layout on mobile */
            .slide img {
                float: none;
                max-width: 100%;
                margin: 20px auto;
                display: block;
            }

            .slide:has(img) h1,
            .slide:has(img) h2,
            .slide:has(img) h3,
            .slide:has(img) p,
            .slide:has(img) ul,
            .slide:has(img) ol {
                max-width: 100%;
            }
        }

        /* Water-themed decorative elements */
        .water-decoration {
            position: fixed;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
            opacity: 0.1;
        }

        .water-decoration::before {
            content: '';
            position: absolute;
            width: 300px;
            height: 300px;
            background: radial-gradient(circle, #00d9ff 0%, transparent 70%);
            top: -150px;
            right: -150px;
            animation: pulse 4s ease-in-out infinite;
        }

        .water-decoration::after {
            content: '';
            position: absolute;
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, #4fc3f7 0%, transparent 70%);
            bottom: -200px;
            left: -200px;
            animation: pulse 6s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% {
                transform: scale(1);
                opacity: 0.3;
            }
            50% {
                transform: scale(1.2);
                opacity: 0.5;
            }
        }

        /* ===== Print / PDF export styles ===== */
        @media print {
            /* Force browsers to keep background colors & images */
            * {
                -webkit-print-color-adjust: exact !important;
                print-color-adjust: exact !important;
            }

            @page {
                size: landscape;
                margin: 0;
            }

            body {
                overflow: visible;
                height: auto;
                background: #0a2342;
            }

            .presentation-container {
                height: auto;
                overflow: visible;
            }

            /* Hide interactive / decorative UI */
            .header,
            .nav-button,
            .progress-bar,
            .shortcuts-hint,
            .loading,
            .water-decoration {
                display: none !important;
            }

            .slide-container {
                display: block;
                padding: 0;
                background: none;
            }

            /* Show every slide, one per page */
            .slide {
                display: block !important;
                width: 100vw;
                height: 100vh;
                max-width: none;
                padding: 60px 80px;
                box-sizing: border-box;
                page-break-after: always;
                break-after: page;
                background: linear-gradient(135deg, #0a2342 0%, #1e5f74 100%);
                position: relative;
                overflow: hidden;
                animation: none !important;
            }

            .slide:last-child {
                page-break-after: avoid;
                break-after: avoid;
            }

            /* Keep text colours */
            .slide h1  { color: #00d9ff; text-shadow: none; }
            .slide h2  { color: #4fc3f7; }
            .slide h3  { color: #81d4fa; }
            .slide p   { color: #e0f7fa; }
            .slide li  { color: #b3e5fc; }
            .slide strong { color: #00d9ff; }
            .slide ul li::marker { color: #00d9ff; }

            /* Images: keep layout, remove hover effects */
            .slide img {
                box-shadow: none;
                border: 2px solid rgba(0, 217, 255, 0.3);
            }
        }

        /* Error message */
        .error-message {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(255, 82, 82, 0.9);
            color: white;
            padding: 30px 50px;
            border-radius: 10px;
            font-size: 1.2em;
            text-align: center;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
            z-index: 1000;
        }
    </style>
</head>
<body>
    <div class="water-decoration"></div>
    
    <div class="presentation-container">
        <div class="header">
            <div class="header-title">SCADA Water Management System</div>
            <div class="slide-counter">
                <span id="currentSlide">1</span> / <span id="totalSlides">1</span>
            </div>
        </div>

        <div class="slide-container" id="slideContainer">
            <div class="loading" id="loading">Loading Presentation...</div>
        </div>

        <button class="nav-button prev" onclick="prevSlide()" id="prevBtn">‹</button>
        <button class="nav-button next" onclick="nextSlide()" id="nextBtn">›</button>

        <div class="progress-bar" id="progressBar"></div>

        <div class="shortcuts-hint">
            Use ← → arrow keys or click buttons to navigate
        </div>
    </div>

    <script>
        let slides = [];
        let currentSlide = 0;

        // Load and parse markdown file
        async function loadPresentation() {
            try {
                console.log('Fetching presentation.md...');
                const response = await fetch('presentation.md?t=' + new Date().getTime());
                
                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}: ${response.statusText}`);
                }
                
                const markdown = await response.text();
                console.log('Loaded markdown, length:', markdown.length);
                console.log('First 100 chars:', markdown.substring(0, 100));
                
                parseMarkdown(markdown);
                renderSlide();
                document.getElementById('loading').style.display = 'none';
                console.log('Presentation loaded successfully!');
                
            } catch (error) {
                console.error('Error loading presentation:', error);
                document.getElementById('loading').innerHTML = 
                    `<div class="error-message">
                        Error loading presentation.md<br>
                        <small>${error.message}</small><br>
                        <small>Make sure you're accessing via http://localhost:8000</small>
                    </div>`;
            }
        }

        // Parse markdown into slides
        function parseMarkdown(markdown) {
            const slideTexts = markdown.split('---').map(s => s.trim()).filter(s => s);
            slides = slideTexts.map(slideText => convertMarkdownToHTML(slideText));
            document.getElementById('totalSlides').textContent = slides.length;
        }

        // Simple markdown to HTML converter
        function convertMarkdownToHTML(markdown) {
            let html = markdown;

            // Extract images first to move them to the right position
            let images = [];
            html = html.replace(/!\[([^\]]*)\]\(([^)]+)\)/g, (match, alt, src) => {
                images.push(`<img src="${src}" alt="${alt}">`);
                return '<!IMAGE_PLACEHOLDER!>';
            });

            // Headers
            html = html.replace(/^### (.+)$/gm, '<h3>$1</h3>');
            html = html.replace(/^## (.+)$/gm, '<h2>$1</h2>');
            html = html.replace(/^# (.+)$/gm, '<h1>$1</h1>');

            // Bold and italic
            html = html.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
            html = html.replace(/\*(.+?)\*/g, '<em>$1</em>');

            // Code
            html = html.replace(/`(.+?)`/g, '<code>$1</code>');

            // Lists - unordered
            html = html.replace(/^\- (.+)$/gm, '<li>$1</li>');
            html = html.replace(/^  - (.+)$/gm, '<li style="margin-left: 30px;">$1</li>');

            // Lists - ordered
            html = html.replace(/^\d+\.\s+(.+)$/gm, '<li>$1</li>');

            // Wrap consecutive list items in ul/ol tags
            html = html.replace(/(<li>.*<\/li>\n?)+/g, (match) => {
                return '<ul>' + match + '</ul>';
            });

            // Paragraphs
            html = html.split('\n\n').map(para => {
                if (!para.match(/^<[hul]/) && !para.includes('<!IMAGE_PLACEHOLDER!>')) {
                    return '<p>' + para.replace(/\n/g, '<br>') + '</p>';
                }
                return para;
            }).join('\n');

            // Remove image placeholders from text
            html = html.replace(/<!IMAGE_PLACEHOLDER!>/g, '');

            // Add images at the beginning (so they float right and text flows around)
            if (images.length > 0) {
                html = images.join('') + html;
            }

            return html;
        }

        // Render current slide
        function renderSlide() {
            const container = document.getElementById('slideContainer');
            container.innerHTML = `<div class="slide active">${slides[currentSlide]}</div>`;
            document.getElementById('currentSlide').textContent = currentSlide + 1;
            updateProgressBar();
            updateNavButtons();
        }

        // Navigation functions
        function nextSlide() {
            if (currentSlide < slides.length - 1) {
                currentSlide++;
                renderSlide();
            }
        }

        function prevSlide() {
            if (currentSlide > 0) {
                currentSlide--;
                renderSlide();
            }
        }

        function updateProgressBar() {
            const progress = ((currentSlide + 1) / slides.length) * 100;
            document.getElementById('progressBar').style.width = progress + '%';
        }

        function updateNavButtons() {
            document.getElementById('prevBtn').style.opacity = currentSlide === 0 ? '0.3' : '1';
            document.getElementById('nextBtn').style.opacity = 
                currentSlide === slides.length - 1 ? '0.3' : '1';
        }

        // Keyboard navigation
        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowRight' || e.key === ' ' || e.key === 'PageDown') {
                e.preventDefault();
                nextSlide();
            } else if (e.key === 'ArrowLeft' || e.key === 'PageUp') {
                e.preventDefault();
                prevSlide();
            } else if (e.key === 'Home') {
                e.preventDefault();
                currentSlide = 0;
                renderSlide();
            } else if (e.key === 'End') {
                e.preventDefault();
                currentSlide = slides.length - 1;
                renderSlide();
            }
        });

        // Auto-reload on file change (development feature)
        let lastModified = null;
        let lastContent = null;
        
        function checkForUpdates() {
            fetch('presentation.md?t=' + new Date().getTime())
                .then(response => response.text())
                .then(content => {
                    if (lastContent && content !== lastContent) {
                        console.log('Presentation.md changed, reloading...');
                        loadPresentation();
                    }
                    lastContent = content;
                })
                .catch((err) => {
                    console.log('Update check failed:', err.message);
                });
        }

        // Check for updates every 2 seconds
        setInterval(checkForUpdates, 2000);

        // Print support: inject ALL slides into the DOM before printing
        window.addEventListener('beforeprint', () => {
            const container = document.getElementById('slideContainer');
            container.innerHTML = slides
                .map(html => `<div class="slide active">${html}</div>`)
                .join('');
        });

        window.addEventListener('afterprint', () => {
            renderSlide(); // restore single-slide view
        });

        // Initialize
        loadPresentation();
    </script>
</body>
</html>
