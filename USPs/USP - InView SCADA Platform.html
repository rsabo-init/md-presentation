<!DOCTYPE html>

<html lang="en"><head><meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
    
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>InView SCADA Platform</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #070707;
            color: #ffffff;
            overflow: hidden;
            height: 100vh;
        }

        .presentation-container {
            width: 100vw;
            height: 100vh;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        /* Header */
        .header {
            background: rgba(7, 7, 7, 0.95);
            border-bottom: 3px solid #f22e0d;
            padding: 15px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 4px 20px rgba(242, 46, 13, 0.15);
        }

        .header-title {
            font-size: 1.2em;
            font-weight: 300;
            letter-spacing: 2px;
            color: #f22e0d;
            text-transform: uppercase;
        }

        .slide-counter {
            font-size: 1em;
            color: #949ca1;
            font-weight: 300;
            background: rgba(242, 46, 13, 0.08);
            padding: 5px 15px;
            border-radius: 20px;
            border: 1px solid rgba(242, 46, 13, 0.3);
        }

        /* Image-only slide overrides */
        .slide-container.image-only-container {
            padding: 10px 20px;
            align-items: flex-start;
        }

        .slide.image-only {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
        }

        .img-slide-title {
            font-size: 0.85em !important;
            margin-bottom: 4px !important;
            color: #4e5559 !important;
            font-weight: 400 !important;
            letter-spacing: 2px !important;
            text-transform: uppercase !important;
            width: 100%;
            text-align: center;
        }

        /* Main slide area */
        .slide-container {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 60px 100px;
            position: relative;
            background:
                radial-gradient(circle at 20% 80%, rgba(242, 46, 13, 0.04) 0%, transparent 50%),
                radial-gradient(circle at 80% 20%, rgba(242, 46, 13, 0.03) 0%, transparent 50%);
        }

        .slide {
            display: none;
            width: 100%;
            max-width: 1400px;
            animation: slideIn 0.5s ease-out;
        }

        .slide.active {
            display: block;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateX(50px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        /* Typography */
        .slide h1 {
            font-size: 3.5em;
            margin-bottom: 20px;
            color: #f22e0d;
            text-shadow: 0 0 30px rgba(242, 46, 13, 0.2);
            font-weight: 700;
            line-height: 1.2;
        }

        .slide h2 {
            font-size: 2.2em;
            margin-bottom: 30px;
            color: #ffffff;
            font-weight: 600;
            line-height: 1.3;
        }

        .slide h3 {
            font-size: 1.8em;
            margin: 25px 0 15px 0;
            color: #949ca1;
            font-weight: 600;
        }

        .slide p {
            font-size: 1.4em;
            line-height: 1.8;
            margin-bottom: 20px;
            color: rgba(255, 255, 255, 0.85);
        }

        .slide ul, .slide ol {
            margin: 8px 0 8px 40px;
            font-size: 1.3em;
            line-height: 1.6;
        }

        .slide li {
            margin-bottom: 6px;
            color: #949ca1;
        }

        .slide strong {
            color: #f22e0d;
            font-weight: 600;
        }

        /* Special styling for bullet points */
        .slide ul li::marker {
            color: #f22e0d;
        }

        /* Tables */
        .slide table {
            border-collapse: collapse;
            width: 100%;
            margin: 20px 0;
            font-size: 1.2em;
        }

        .slide th {
            background: rgba(242, 46, 13, 0.15);
            color: #f22e0d;
            padding: 12px 20px;
            text-align: left;
            border: 1px solid rgba(242, 46, 13, 0.3);
            font-weight: 600;
        }

        .slide td {
            padding: 10px 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: rgba(255, 255, 255, 0.85);
        }

        .slide tr:nth-child(even) td {
            background: rgba(255, 255, 255, 0.03);
        }

        /* Code blocks */
        .slide code {
            background: rgba(242, 46, 13, 0.1);
            padding: 2px 8px;
            border-radius: 4px;
            color: #f22e0d;
            font-family: 'Courier New', monospace;
        }

        /* Images - Two column layout */
        .slide img {
            float: right;
            max-width: 40%;
            max-height: 70vh;
            width: auto;
            height: auto;
            margin: 0 0 20px 30px;
            border-radius: 10px;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.4);
            border: 1px solid #282828;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            object-fit: contain;
        }

        .slide img:hover {
            transform: scale(1.02);
            box-shadow: 0 12px 40px rgba(242, 46, 13, 0.15);
        }

        /* SVG images: larger display for diagram-heavy slides */
        .slide img[src$=".svg"] {
            max-width: 55%;
            max-height: 75vh;
            border: none;
            box-shadow: none;
            border-radius: 12px;
        }

        .slide img[src$=".svg"]:hover {
            transform: scale(1.01);
            box-shadow: none;
        }

        /* Content wrapper for slides with images */
        .slide-content {
            overflow: auto;
            width: 100%;
        }

        /* Text content adjusts when image is present */
        .slide:has(img) h1,
        .slide:has(img) h2,
        .slide:has(img) h3,
        .slide:has(img) p,
        .slide:has(img) ul,
        .slide:has(img) ol {
            max-width: 55%;
            margin-right: auto;
        }

        /* Clear floats after slide content */
        .slide::after {
            content: '';
            display: table;
            clear: both;
        }

        /* Navigation */
        .nav-button {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(242, 46, 13, 0.1);
            border: 2px solid rgba(242, 46, 13, 0.4);
            color: #f22e0d;
            font-size: 2em;
            padding: 20px 30px;
            cursor: pointer;
            transition: all 0.3s ease;
            z-index: 10;
            border-radius: 10px;
            backdrop-filter: blur(10px);
        }

        .nav-button:hover {
            background: rgba(242, 46, 13, 0.25);
            box-shadow: 0 0 20px rgba(242, 46, 13, 0.3);
            transform: translateY(-50%) scale(1.1);
        }

        .nav-button:active {
            transform: translateY(-50%) scale(0.95);
        }

        .nav-button.prev {
            left: 30px;
        }

        .nav-button.next {
            right: 30px;
        }

        /* Progress bar */
        .progress-bar {
            position: absolute;
            bottom: 0;
            left: 0;
            height: 5px;
            background: #f22e0d;
            transition: width 0.3s ease;
            box-shadow: 0 0 10px rgba(242, 46, 13, 0.5);
        }

        /* Loading indicator */
        .loading {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 2em;
            color: #f22e0d;
            text-align: center;
        }

        .loading::after {
            content: '';
            display: block;
            width: 50px;
            height: 50px;
            margin: 20px auto;
            border: 5px solid #282828;
            border-top-color: #f22e0d;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Keyboard shortcuts hint */
        .shortcuts-hint {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(78, 85, 89, 0.15);
            padding: 10px 20px;
            border-radius: 20px;
            border: 1px solid #282828;
            font-size: 0.9em;
            color: #4e5559;
            opacity: 0.7;
            transition: opacity 0.3s;
        }

        .shortcuts-hint:hover {
            opacity: 1;
        }

        /* Responsive design */
        @media (max-width: 1200px) {
            .slide-container {
                padding: 40px 60px;
            }

            .slide h1 {
                font-size: 2.8em;
            }

            .slide h2 {
                font-size: 1.8em;
            }

            .slide p, .slide li {
                font-size: 1.2em;
            }

            .slide img {
                max-width: 45%;
            }

            .slide:has(img) h1,
            .slide:has(img) h2,
            .slide:has(img) h3,
            .slide:has(img) p,
            .slide:has(img) ul,
            .slide:has(img) ol {
                max-width: 50%;
            }
        }

        @media (max-width: 768px) {
            .slide-container {
                padding: 20px 30px;
            }

            .slide h1 {
                font-size: 2em;
            }

            .slide h2 {
                font-size: 1.5em;
            }

            .nav-button {
                padding: 15px 20px;
                font-size: 1.5em;
            }

            /* Stack layout on mobile */
            .slide img {
                float: none;
                max-width: 100%;
                margin: 20px auto;
                display: block;
            }

            .slide:has(img) h1,
            .slide:has(img) h2,
            .slide:has(img) h3,
            .slide:has(img) p,
            .slide:has(img) ul,
            .slide:has(img) ol {
                max-width: 100%;
            }
        }

        /* Decorative glow */
        .bg-decoration {
            position: fixed;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
            opacity: 0.08;
        }

        .bg-decoration::before {
            content: '';
            position: absolute;
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, #f22e0d 0%, transparent 70%);
            top: -200px;
            right: -200px;
            animation: pulse 5s ease-in-out infinite;
        }

        .bg-decoration::after {
            content: '';
            position: absolute;
            width: 350px;
            height: 350px;
            background: radial-gradient(circle, #7c2516 0%, transparent 70%);
            bottom: -175px;
            left: -175px;
            animation: pulse 7s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% {
                transform: scale(1);
                opacity: 0.3;
            }
            50% {
                transform: scale(1.2);
                opacity: 0.5;
            }
        }

        /* ===== Print / PDF export styles ===== */
        @media print {
            * {
                -webkit-print-color-adjust: exact !important;
                print-color-adjust: exact !important;
            }

            @page {
                size: landscape;
                margin: 0;
            }

            body {
                overflow: visible;
                height: auto;
                background: #070707;
            }

            .presentation-container {
                height: auto;
                overflow: visible;
            }

            .header,
            .nav-button,
            .progress-bar,
            .shortcuts-hint,
            .loading,
            .bg-decoration {
                display: none !important;
            }

            .slide-container {
                display: block;
                padding: 0;
                background: none;
            }

            .slide {
                display: block !important;
                width: 100vw;
                height: 100vh;
                max-width: none;
                padding: 60px 80px;
                box-sizing: border-box;
                page-break-after: always;
                break-after: page;
                background: #070707;
                position: relative;
                overflow: hidden;
                animation: none !important;
            }

            .slide:last-child {
                page-break-after: avoid;
                break-after: avoid;
            }

            .slide h1  { color: #f22e0d; text-shadow: none; }
            .slide h2  { color: #ffffff; }
            .slide h3  { color: #949ca1; }
            .slide p   { color: rgba(255, 255, 255, 0.85); }
            .slide li  { color: #949ca1; }
            .slide strong { color: #f22e0d; }
            .slide ul li::marker { color: #f22e0d; }

            .slide img {
                box-shadow: none;
                border: 1px solid #282828;
            }
        }

        /* Error message */
        .error-message {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(242, 46, 13, 0.9);
            color: white;
            padding: 30px 50px;
            border-radius: 10px;
            font-size: 1.2em;
            text-align: center;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
            z-index: 1000;
        }
    </style>

<body>
    <div class="bg-decoration"></div>

    <div class="presentation-container">
        <div class="header">
            <div class="header-title">InView SCADA Platform</div>
            <div class="slide-counter">
                <span id="currentSlide">1</span> / <span id="totalSlides">19</span>
            </div>
        </div>

        <div class="slide-container" id="slideContainer"><div class="slide active"><h1>InView SCADA Platform</h1>
<h2>Definisanje USP-ova Brainstorming</h2>
<p><strong>Šta nas čini posebnim?</strong><br>Tehnički i produktni pogled na ključne prednosti  <br><em>Internal | Mart 2026</em></p></div></div>

        <button class="nav-button prev" onclick="prevSlide()" id="prevBtn" style="opacity: 0.3;">‹</button>
        <button class="nav-button next" onclick="nextSlide()" id="nextBtn" style="opacity: 1;">›</button>

        <div class="progress-bar" id="progressBar" style="width: 5.26316%;"></div>

        <div class="shortcuts-hint">
            Use ← → arrow keys or click buttons to navigate
        </div>
    </div>

    <script>
        let slides = [];
        let currentSlide = 0;

        async function loadPresentation() {
            try {
                const response = await fetch('presentation.md?t=' + new Date().getTime());
                if (!response.ok) throw new Error(`HTTP ${response.status}: ${response.statusText}`);
                const markdown = await response.text();
                parseMarkdown(markdown);
                goToSlideFromHash();
                renderSlide();
                document.getElementById('loading').style.display = 'none';
            } catch (error) {
                document.getElementById('loading').innerHTML =
                    `<div class="error-message">
                        Error loading presentation.md<br>
                        <small>${error.message}</small><br>
                        <small>Make sure you're accessing via http://localhost:8000</small>
                    </div>`;
            }
        }

        function parseMarkdown(markdown) {
            markdown = markdown.replace(/\r\n/g, '\n').replace(/\r/g, '\n');
            const slideTexts = markdown.split(/\n---\n/).map(s => s.trim()).filter(s => s);
            slides = slideTexts.map(slideText => convertMarkdownToHTML(slideText));
            document.getElementById('totalSlides').textContent = slides.length;
            const titleMatch = markdown.match(/^#\s+(.+)/m);
            if (titleMatch) {
                const title = titleMatch[1].trim();
                document.querySelector('.header-title').textContent = title;
                document.title = title;
            }
        }

        function convertMarkdownToHTML(markdown) {
            let html = markdown;
            // Normalize Windows CRLF to LF
            html = html.replace(/\r\n/g, '\n').replace(/\r/g, '\n');
            // Strip hidden notes: <!-- ... --> blocks (talk tracks, slide markers)
            html = html.replace(/<!--[\s\S]*?-->/g, '');
            let images = [];
            html = html.replace(/!\[([^\]]*)\]\(([^)]+)\)/g, (match, alt, src) => {
                images.push(`<img src="${src}" alt="${alt}">`);
                return '<!IMAGE_PLACEHOLDER!>';
            });

            // Convert markdown tables
            html = html.replace(/((?:\|.+\|\n)+)/g, (tableBlock) => {
                const rows = tableBlock.trim().split('\n').map(r => r.trim()).filter(r => r);
                let tableHtml = '<table>';
                let isHeader = true;
                rows.forEach((row) => {
                    if (row.match(/^\|[\s\-:|]+\|$/)) { isHeader = false; return; }
                    const cells = row.split('|').slice(1, -1).map(c => c.trim());
                    const tag = isHeader ? 'th' : 'td';
                    tableHtml += '<tr>' + cells.map(c => `<${tag}>${c}</${tag}>`).join('') + '</tr>';
                });
                tableHtml += '</table>';
                return tableHtml;
            });

            html = html.replace(/^### (.+)$/gm, '<h3>$1</h3>');
            html = html.replace(/^## (.+)$/gm, '<h2>$1</h2>');
            html = html.replace(/^# (.+)$/gm, '<h1>$1</h1>');
            html = html.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
            html = html.replace(/\*(.+?)\*/g, '<em>$1</em>');
            html = html.replace(/`(.+?)`/g, '<code>$1</code>');
            html = html.replace(/^\- (.+)$/gm, '<li>$1</li>');
            html = html.replace(/^  - (.+)$/gm, '<li style="margin-left: 30px;">$1</li>');
            html = html.replace(/^\d+\.\s+(.+)$/gm, '<li>$1</li>');
            html = html.replace(/(<li>.*<\/li>\n?)+/g, (match) => '<ul>' + match + '</ul>');

            html = html.split('\n\n').map(para => {
                const isBlock = para.match(/^<[hult]/) || para.includes('<ul>') || para.includes('<li>');
                if (!isBlock && !para.includes('<!IMAGE_PLACEHOLDER!>')) {
                    return '<p>' + para.replace(/\n/g, '<br>') + '</p>';
                }
                return para;
            }).join('\n');

            html = html.replace(/<!IMAGE_PLACEHOLDER!>/g, '');

            const strippedText = html.replace(/<[^>]+>/g, '').replace(/\s+/g, ' ').trim();
            const isImageOnly = images.length === 1 && strippedText.length < 60;

            if (isImageOnly) {
                const isSvg = images[0].includes('.svg');
                const maxW = isSvg ? '92%' : '97%';
                const maxH = isSvg ? '82vh' : '88vh';
                html = '<!--IMAGEONLY--><div style="text-align:center;width:100%;display:flex;flex-direction:column;align-items:center;">' +
                    html.replace(/<h2>(.+?)<\/h2>/, '<h2 class="img-slide-title">$1</h2>') +
                    images[0].replace('img ', 'img style="float:none;max-width:' + maxW + ';max-height:' + maxH + ';object-fit:contain;margin:4px auto 0;display:block;border-radius:8px;" ') +
                    '</div>';
            } else if (images.length > 0) {
                html = images.join('') + html;
            }

            return html;
        }

        function renderSlide() {
            const container = document.getElementById('slideContainer');
            const content = slides[currentSlide];
            const isImgOnly = content.startsWith('<!--IMAGEONLY-->');
            const cleanContent = isImgOnly ? content.replace('<!--IMAGEONLY-->', '') : content;
            container.innerHTML = `<div class="slide active${isImgOnly ? ' image-only' : ''}">${cleanContent}</div>`;
            const sc = document.getElementById('slideContainer');
            if (isImgOnly) { sc.classList.add('image-only-container'); }
            else { sc.classList.remove('image-only-container'); }
            document.getElementById('currentSlide').textContent = currentSlide + 1;
            history.replaceState(null, '', '#' + (currentSlide + 1));
            updateProgressBar();
            updateNavButtons();
        }

        function nextSlide() { if (currentSlide < slides.length - 1) { currentSlide++; renderSlide(); } }
        function prevSlide() { if (currentSlide > 0) { currentSlide--; renderSlide(); } }

        function goToSlideFromHash() {
            const hash = parseInt(window.location.hash.replace('#', ''));
            if (!isNaN(hash) && hash >= 1 && hash <= slides.length) {
                currentSlide = hash - 1;
            }
        }

        function updateProgressBar() {
            document.getElementById('progressBar').style.width = ((currentSlide + 1) / slides.length) * 100 + '%';
        }

        function updateNavButtons() {
            document.getElementById('prevBtn').style.opacity = currentSlide === 0 ? '0.3' : '1';
            document.getElementById('nextBtn').style.opacity = currentSlide === slides.length - 1 ? '0.3' : '1';
        }

        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowRight' || e.key === ' ' || e.key === 'PageDown') { e.preventDefault(); nextSlide(); }
            else if (e.key === 'ArrowLeft' || e.key === 'PageUp') { e.preventDefault(); prevSlide(); }
            else if (e.key === 'Home') { e.preventDefault(); currentSlide = 0; renderSlide(); }
            else if (e.key === 'End') { e.preventDefault(); currentSlide = slides.length - 1; renderSlide(); }
            else if (e.key >= '1' && e.key <= '9') { const n = parseInt(e.key) - 1; if (n < slides.length) { currentSlide = n; renderSlide(); } }
        });

        let lastContent = null;
        function checkForUpdates() {
            fetch('presentation.md?t=' + new Date().getTime())
                .then(r => r.text())
                .then(content => { if (lastContent && content !== lastContent) loadPresentation(); lastContent = content; })
                .catch(() => {});
        }
        setInterval(checkForUpdates, 2000);

        window.addEventListener('beforeprint', () => {
            document.getElementById('slideContainer').innerHTML = slides.map(html => `<div class="slide active">${html}</div>`).join('');
        });
        window.addEventListener('afterprint', () => renderSlide());

        loadPresentation();
    </script>


</body></html>
