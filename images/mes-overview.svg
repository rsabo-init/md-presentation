<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 750 450" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <linearGradient id="bgMes" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#070707"/>
      <stop offset="100%" stop-color="#0f0f0f"/>
    </linearGradient>
  </defs>
  <rect width="750" height="450" fill="url(#bgMes)" rx="12"/>

  <text x="375" y="35" text-anchor="middle" fill="#2ecc71" font-size="20" font-weight="bold">MES Solution Overview</text>

  <!-- Central MES Hub -->
  <circle cx="375" cy="225" r="75" fill="rgba(46,204,113,0.2)" stroke="#2ecc71" stroke-width="2.5"/>
  <circle cx="375" cy="225" r="55" fill="rgba(46,204,113,0.3)" stroke="#2ecc71" stroke-width="1"/>
  <text x="375" y="215" text-anchor="middle" fill="#2ecc71" font-size="18" font-weight="bold">InView</text>
  <text x="375" y="237" text-anchor="middle" fill="#a9dfbf" font-size="14">MES</text>

  <!-- Module 1 - Production Planning (top) -->
  <rect x="295" y="55" width="160" height="55" rx="8" fill="rgba(242,46,13,0.2)" stroke="#f22e0d" stroke-width="1.5"/>
  <text x="375" y="78" text-anchor="middle" fill="#f22e0d" font-size="13" font-weight="bold">Production</text>
  <text x="375" y="98" text-anchor="middle" fill="#b0b5b9" font-size="11">Planning &amp; Scheduling</text>
  <line x1="375" y1="110" x2="375" y2="150" stroke="#f22e0d" stroke-width="1.5" stroke-dasharray="4,3"/>

  <!-- Module 2 - Work Orders (top-right) -->
  <rect x="530" y="100" width="160" height="55" rx="8" fill="rgba(242,46,13,0.2)" stroke="#f22e0d" stroke-width="1.5"/>
  <text x="610" y="123" text-anchor="middle" fill="#f22e0d" font-size="13" font-weight="bold">Work Orders</text>
  <text x="610" y="143" text-anchor="middle" fill="#ff6b52" font-size="11">Tracking &amp; Execution</text>
  <line x1="530" y1="130" x2="450" y2="195" stroke="#f22e0d" stroke-width="1.5" stroke-dasharray="4,3"/>

  <!-- Module 3 - Labor Tracking (right) -->
  <rect x="530" y="230" width="160" height="55" rx="8" fill="rgba(78,85,89,0.2)" stroke="#4e5559" stroke-width="1.5"/>
  <text x="610" y="253" text-anchor="middle" fill="#4e5559" font-size="13" font-weight="bold">Labor Tracking</text>
  <text x="610" y="273" text-anchor="middle" fill="#b0b5b9" font-size="11">Hours &amp; Shifts</text>
  <line x1="530" y1="257" x2="450" y2="237" stroke="#4e5559" stroke-width="1.5" stroke-dasharray="4,3"/>

  <!-- Module 4 - Quality (bottom-right) -->
  <rect x="480" y="340" width="160" height="55" rx="8" fill="rgba(241,196,15,0.2)" stroke="#f1c40f" stroke-width="1.5"/>
  <text x="560" y="363" text-anchor="middle" fill="#f1c40f" font-size="13" font-weight="bold">Quality</text>
  <text x="560" y="383" text-anchor="middle" fill="#c0c5c9" font-size="11">Monitoring &amp; Control</text>
  <line x1="490" y1="355" x2="420" y2="280" stroke="#f1c40f" stroke-width="1.5" stroke-dasharray="4,3"/>

  <!-- Module 5 - Planning (bottom-left) - CHANGED FROM DOWNTIME -->
  <rect x="110" y="340" width="160" height="55" rx="8" fill="rgba(242,46,13,0.2)" stroke="#f22e0d" stroke-width="1.5"/>
  <text x="190" y="363" text-anchor="middle" fill="#f22e0d" font-size="13" font-weight="bold">Planning</text>
  <text x="190" y="383" text-anchor="middle" fill="#ff6b52" font-size="11">Scheduling &amp; Sequencing</text>
  <line x1="260" y1="355" x2="330" y2="280" stroke="#f22e0d" stroke-width="1.5" stroke-dasharray="4,3"/>

  <!-- Module 6 - SAP Integration (left) -->
  <rect x="60" y="230" width="160" height="55" rx="8" fill="rgba(242,46,13,0.2)" stroke="#f22e0d" stroke-width="1.5"/>
  <text x="140" y="253" text-anchor="middle" fill="#f22e0d" font-size="13" font-weight="bold">SAP Integration</text>
  <text x="140" y="273" text-anchor="middle" fill="#b0b5b9" font-size="11">Bidirectional Sync</text>
  <line x1="220" y1="257" x2="300" y2="237" stroke="#f22e0d" stroke-width="1.5" stroke-dasharray="4,3"/>

  <!-- Module 7 - SCADA (top-left) -->
  <rect x="60" y="100" width="160" height="55" rx="8" fill="rgba(46,204,113,0.2)" stroke="#2ecc71" stroke-width="1.5"/>
  <text x="140" y="123" text-anchor="middle" fill="#2ecc71" font-size="13" font-weight="bold">SCADA Base</text>
  <text x="140" y="143" text-anchor="middle" fill="#a9dfbf" font-size="11">Monitoring &amp; Control</text>
  <line x1="220" y1="130" x2="300" y2="195" stroke="#2ecc71" stroke-width="1.5" stroke-dasharray="4,3"/>

  <!-- Bottom label -->
  <rect x="175" y="415" width="400" height="28" rx="6" fill="rgba(255,255,255,0.05)"/>
  <text x="375" y="434" text-anchor="middle" fill="#bdc3c7" font-size="12">Deployed at Tarkett PVC (2016) and Tarkett Wood (2021)</text>
</svg>