<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 450" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <linearGradient id="bgCh" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#070707"/>
      <stop offset="100%" stop-color="#0f0f0f"/>
    </linearGradient>
  </defs>
  <rect width="700" height="450" fill="url(#bgCh)" rx="12"/>

  <text x="350" y="35" text-anchor="middle" fill="#e74c3c" font-size="20" font-weight="bold">Key Challenges at Tarkett</text>

  <!-- Challenge 1 -->
  <rect x="30" y="60" width="300" height="100" rx="10" fill="rgba(231,76,60,0.15)" stroke="#e74c3c" stroke-width="1.5"/>
  <circle cx="65" cy="110" r="22" fill="#e74c3c" opacity="0.8"/>
  <text x="65" y="116" text-anchor="middle" fill="white" font-size="20" font-weight="bold">1</text>
  <text x="100" y="90" fill="#e74c3c" font-size="14" font-weight="bold">Limited Visibility</text>
  <text x="100" y="110" fill="#fab1a0" font-size="11">No comprehensive overview of</text>
  <text x="100" y="125" fill="#fab1a0" font-size="11">production across all stages</text>
  <text x="100" y="145" fill="#fab1a0" font-size="11">and plant areas</text>

  <!-- Challenge 2 -->
  <rect x="370" y="60" width="300" height="100" rx="10" fill="rgba(231,76,60,0.15)" stroke="#e74c3c" stroke-width="1.5"/>
  <circle cx="405" cy="110" r="22" fill="#e74c3c" opacity="0.8"/>
  <text x="405" y="116" text-anchor="middle" fill="white" font-size="20" font-weight="bold">2</text>
  <text x="440" y="90" fill="#e74c3c" font-size="14" font-weight="bold">Double Data Entry</text>
  <text x="440" y="110" fill="#fab1a0" font-size="11">Manual duplicate entry causing</text>
  <text x="440" y="125" fill="#fab1a0" font-size="11">inefficiencies and errors in</text>
  <text x="440" y="145" fill="#fab1a0" font-size="11">operational workflows</text>

  <!-- Challenge 3 -->
  <rect x="30" y="185" width="300" height="100" rx="10" fill="rgba(231,76,60,0.15)" stroke="#e74c3c" stroke-width="1.5"/>
  <circle cx="65" cy="235" r="22" fill="#e74c3c" opacity="0.8"/>
  <text x="65" y="241" text-anchor="middle" fill="white" font-size="20" font-weight="bold">3</text>
  <text x="100" y="215" fill="#e74c3c" font-size="14" font-weight="bold">SAP Disconnect</text>
  <text x="100" y="235" fill="#fab1a0" font-size="11">Gap between SAP planning</text>
  <text x="100" y="250" fill="#fab1a0" font-size="11">and actual shop floor</text>
  <text x="100" y="265" fill="#fab1a0" font-size="11">execution data</text>

  <!-- Challenge 4 -->
  <rect x="370" y="185" width="300" height="100" rx="10" fill="rgba(231,76,60,0.15)" stroke="#e74c3c" stroke-width="1.5"/>
  <circle cx="405" cy="235" r="22" fill="#e74c3c" opacity="0.8"/>
  <text x="405" y="241" text-anchor="middle" fill="white" font-size="20" font-weight="bold">4</text>
  <text x="440" y="215" fill="#e74c3c" font-size="14" font-weight="bold">Knowledge Loss</text>
  <text x="440" y="235" fill="#fab1a0" font-size="11">Unstructured transfer of</text>
  <text x="440" y="250" fill="#fab1a0" font-size="11">operational know-how between</text>
  <text x="440" y="265" fill="#fab1a0" font-size="11">experienced and new staff</text>

  <!-- Challenge 5 -->
  <rect x="30" y="310" width="300" height="100" rx="10" fill="rgba(231,76,60,0.15)" stroke="#e74c3c" stroke-width="1.5"/>
  <circle cx="65" cy="360" r="22" fill="#e74c3c" opacity="0.8"/>
  <text x="65" y="366" text-anchor="middle" fill="white" font-size="20" font-weight="bold">5</text>
  <text x="100" y="340" fill="#e74c3c" font-size="14" font-weight="bold">Manual Calculations</text>
  <text x="100" y="360" fill="#fab1a0" font-size="11">Error-prone manual processes</text>
  <text x="100" y="375" fill="#fab1a0" font-size="11">for production tracking and</text>
  <text x="100" y="390" fill="#fab1a0" font-size="11">labor hour recording</text>

  <!-- Challenge 6 -->
  <rect x="370" y="310" width="300" height="100" rx="10" fill="rgba(231,76,60,0.15)" stroke="#e74c3c" stroke-width="1.5"/>
  <circle cx="405" cy="360" r="22" fill="#e74c3c" opacity="0.8"/>
  <text x="405" y="366" text-anchor="middle" fill="white" font-size="20" font-weight="bold">6</text>
  <text x="440" y="340" fill="#e74c3c" font-size="14" font-weight="bold">Data Loss Risk</text>
  <text x="440" y="360" fill="#fab1a0" font-size="11">Critical business data lost</text>
  <text x="440" y="375" fill="#fab1a0" font-size="11">due to inconsistent processes</text>
  <text x="440" y="390" fill="#fab1a0" font-size="11">and lack of standardization</text>
</svg>