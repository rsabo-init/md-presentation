<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <linearGradient id="bgBa" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#070707"/>
      <stop offset="100%" stop-color="#0f0f0f"/>
    </linearGradient>
  </defs>
  <rect width="800" height="450" fill="url(#bgBa)" rx="12"/>

  <text x="400" y="32" text-anchor="middle" fill="#949ca1" font-size="18" font-weight="bold">Operations: Before vs After InView MES</text>

  <!-- Before column -->
  <rect x="30" y="50" width="355" height="380" rx="10" fill="rgba(231,76,60,0.08)" stroke="#e74c3c" stroke-width="2"/>
  <rect x="120" y="57" width="170" height="30" rx="6" fill="#e74c3c"/>
  <text x="205" y="77" text-anchor="middle" fill="white" font-size="14" font-weight="bold">BEFORE</text>

  <text x="55" y="115" fill="#e74c3c" font-size="12" font-weight="bold">Data Entry</text>
  <text x="55" y="135" fill="#bdc3c7" font-size="11">Manual entry in SAP + paper logs</text>
  <text x="55" y="150" fill="#7f8c8d" font-size="10">Double data entry, error-prone</text>

  <line x1="55" y1="165" x2="360" y2="165" stroke="rgba(255,255,255,0.05)" stroke-width="1"/>

  <text x="55" y="185" fill="#e74c3c" font-size="12" font-weight="bold">Production Tracking</text>
  <text x="55" y="205" fill="#bdc3c7" font-size="11">Manual calculations on spreadsheets</text>
  <text x="55" y="220" fill="#7f8c8d" font-size="10">Delayed, inaccurate, inconsistent</text>

  <line x1="55" y1="235" x2="360" y2="235" stroke="rgba(255,255,255,0.05)" stroke-width="1"/>

  <text x="55" y="255" fill="#e74c3c" font-size="12" font-weight="bold">Downtime Recording</text>
  <text x="55" y="275" fill="#bdc3c7" font-size="11">Paper-based or not recorded at all</text>
  <text x="55" y="290" fill="#7f8c8d" font-size="10">No root cause analysis possible</text>

  <line x1="55" y1="305" x2="360" y2="305" stroke="rgba(255,255,255,0.05)" stroke-width="1"/>

  <text x="55" y="325" fill="#e74c3c" font-size="12" font-weight="bold">SAP Interaction</text>
  <text x="55" y="345" fill="#bdc3c7" font-size="11">Operators need SAP training + login</text>
  <text x="55" y="360" fill="#7f8c8d" font-size="10">Complex, slow, resistance from floor staff</text>

  <line x1="55" y1="375" x2="360" y2="375" stroke="rgba(255,255,255,0.05)" stroke-width="1"/>

  <text x="55" y="395" fill="#e74c3c" font-size="12" font-weight="bold">Shift Handover</text>
  <text x="55" y="415" fill="#bdc3c7" font-size="11">Verbal or notebook-based, info lost</text>

  <!-- Arrow -->
  <polygon points="395,230 415,215 415,210 430,225 415,240 415,235" fill="#949ca1"/>

  <!-- After column -->
  <rect x="440" y="50" width="330" height="380" rx="10" fill="rgba(46,204,113,0.08)" stroke="#2ecc71" stroke-width="2"/>
  <rect x="520" y="57" width="170" height="30" rx="6" fill="#2ecc71"/>
  <text x="605" y="77" text-anchor="middle" fill="white" font-size="14" font-weight="bold">AFTER InView</text>

  <text x="465" y="115" fill="#2ecc71" font-size="12" font-weight="bold">Data Entry</text>
  <text x="465" y="135" fill="#bdc3c7" font-size="11">Single entry in InView -> auto SAP</text>
  <text x="465" y="150" fill="#a9dfbf" font-size="10">Zero duplication, validated input</text>

  <line x1="465" y1="165" x2="745" y2="165" stroke="rgba(255,255,255,0.05)" stroke-width="1"/>

  <text x="465" y="185" fill="#2ecc71" font-size="12" font-weight="bold">Production Tracking</text>
  <text x="465" y="205" fill="#bdc3c7" font-size="11">Real-time automated collection</text>
  <text x="465" y="220" fill="#a9dfbf" font-size="10">Live dashboards, instant KPIs</text>

  <line x1="465" y1="235" x2="745" y2="235" stroke="rgba(255,255,255,0.05)" stroke-width="1"/>

  <text x="465" y="255" fill="#2ecc71" font-size="12" font-weight="bold">Downtime Recording</text>
  <text x="465" y="275" fill="#bdc3c7" font-size="11">Digital, categorized, with analytics</text>
  <text x="465" y="290" fill="#a9dfbf" font-size="10">MTBF, MTTR, Pareto analysis</text>

  <line x1="465" y1="305" x2="745" y2="305" stroke="rgba(255,255,255,0.05)" stroke-width="1"/>

  <text x="465" y="325" fill="#2ecc71" font-size="12" font-weight="bold">SAP Interaction</text>
  <text x="465" y="345" fill="#bdc3c7" font-size="11">Operators never touch SAP</text>
  <text x="465" y="360" fill="#a9dfbf" font-size="10">Intuitive buttons, shop-floor friendly</text>

  <line x1="465" y1="375" x2="745" y2="375" stroke="rgba(255,255,255,0.05)" stroke-width="1"/>

  <text x="465" y="395" fill="#2ecc71" font-size="12" font-weight="bold">Shift Handover</text>
  <text x="465" y="415" fill="#bdc3c7" font-size="11">Digital log, previous shift visible</text>
</svg>