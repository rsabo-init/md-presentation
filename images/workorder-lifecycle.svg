<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 480" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <linearGradient id="bgWo" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#070707"/>
      <stop offset="100%" stop-color="#0f0f0f"/>
    </linearGradient>
    <marker id="aFlow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#949ca1"/>
    </marker>
  </defs>
  <rect width="800" height="480" fill="url(#bgWo)" rx="12"/>

  <text x="400" y="32" text-anchor="middle" fill="#949ca1" font-size="18" font-weight="bold">Work Order Lifecycle: SAP to Shop Floor and Back</text>

  <!-- Step 1: SAP Creates -->
  <rect x="30" y="55" width="150" height="90" rx="10" fill="rgba(242,46,13,0.2)" stroke="#f22e0d" stroke-width="2"/>
  <circle cx="55" cy="73" r="12" fill="#f22e0d"/>
  <text x="55" y="78" text-anchor="middle" fill="white" font-size="12" font-weight="bold">1</text>
  <text x="105" y="78" text-anchor="middle" fill="#f22e0d" font-size="12" font-weight="bold">SAP</text>
  <text x="105" y="98" text-anchor="middle" fill="#b0b5b9" font-size="11">Create &amp;</text>
  <text x="105" y="113" text-anchor="middle" fill="#b0b5b9" font-size="11">Release Order</text>
  <text x="105" y="135" text-anchor="middle" fill="#7f8c8d" font-size="9">PP module</text>

  <line x1="180" y1="100" x2="220" y2="100" stroke="#949ca1" stroke-width="2" marker-end="url(#aFlow)"/>

  <!-- Step 2: Sync -->
  <rect x="225" y="55" width="150" height="90" rx="10" fill="rgba(242,46,13,0.2)" stroke="#f22e0d" stroke-width="2"/>
  <circle cx="250" cy="73" r="12" fill="#f22e0d"/>
  <text x="250" y="78" text-anchor="middle" fill="white" font-size="12" font-weight="bold">2</text>
  <text x="300" y="78" text-anchor="middle" fill="#f22e0d" font-size="12" font-weight="bold">Auto Sync</text>
  <text x="300" y="98" text-anchor="middle" fill="#ff6b52" font-size="11">Order appears</text>
  <text x="300" y="113" text-anchor="middle" fill="#ff6b52" font-size="11">in InView</text>
  <text x="300" y="135" text-anchor="middle" fill="#7f8c8d" font-size="9">RFC/API call</text>

  <line x1="375" y1="100" x2="415" y2="100" stroke="#949ca1" stroke-width="2" marker-end="url(#aFlow)"/>

  <!-- Step 3: Operator Opens -->
  <rect x="420" y="55" width="150" height="90" rx="10" fill="rgba(46,204,113,0.2)" stroke="#2ecc71" stroke-width="2"/>
  <circle cx="445" cy="73" r="12" fill="#2ecc71"/>
  <text x="445" y="78" text-anchor="middle" fill="white" font-size="12" font-weight="bold">3</text>
  <text x="495" y="78" text-anchor="middle" fill="#2ecc71" font-size="12" font-weight="bold">Operator</text>
  <text x="495" y="98" text-anchor="middle" fill="#a9dfbf" font-size="11">Opens work</text>
  <text x="495" y="113" text-anchor="middle" fill="#a9dfbf" font-size="11">order on screen</text>
  <text x="495" y="135" text-anchor="middle" fill="#7f8c8d" font-size="9">Shop floor HMI</text>

  <line x1="570" y1="100" x2="610" y2="100" stroke="#949ca1" stroke-width="2" marker-end="url(#aFlow)"/>

  <!-- Step 4: Production runs -->
  <rect x="615" y="55" width="155" height="90" rx="10" fill="rgba(46,204,113,0.2)" stroke="#2ecc71" stroke-width="2"/>
  <circle cx="640" cy="73" r="12" fill="#2ecc71"/>
  <text x="640" y="78" text-anchor="middle" fill="white" font-size="12" font-weight="bold">4</text>
  <text x="692" y="78" text-anchor="middle" fill="#2ecc71" font-size="12" font-weight="bold">Production</text>
  <text x="692" y="98" text-anchor="middle" fill="#a9dfbf" font-size="11">Real-time data</text>
  <text x="692" y="113" text-anchor="middle" fill="#a9dfbf" font-size="11">collection</text>
  <text x="692" y="135" text-anchor="middle" fill="#7f8c8d" font-size="9">Cycles, qty, quality</text>

  <!-- Arrow down from step 4 -->
  <line x1="692" y1="145" x2="692" y2="185" stroke="#949ca1" stroke-width="2" marker-end="url(#aFlow)"/>

  <!-- Step 5: During production - events -->
  <rect x="515" y="190" width="255" height="100" rx="10" fill="rgba(78,85,89,0.15)" stroke="#4e5559" stroke-width="1.5"/>
  <text x="642" y="212" text-anchor="middle" fill="#4e5559" font-size="13" font-weight="bold">During Production</text>
  <text x="535" y="235" fill="#b0b5b9" font-size="11">  Record downtimes (Zastoj)</text>
  <text x="535" y="253" fill="#b0b5b9" font-size="11">  Pause / resume order</text>
  <text x="535" y="271" fill="#b0b5b9" font-size="11">  Flag wrong order (Pogresno otvoren)</text>

  <!-- Arrow left from events -->
  <line x1="515" y1="240" x2="470" y2="240" stroke="#949ca1" stroke-width="2" marker-end="url(#aFlow)"/>

  <!-- Step 6: Booking -->
  <rect x="225" y="190" width="240" height="100" rx="10" fill="rgba(242,46,13,0.2)" stroke="#f22e0d" stroke-width="2"/>
  <circle cx="250" cy="210" r="12" fill="#f22e0d"/>
  <text x="250" y="215" text-anchor="middle" fill="white" font-size="12" font-weight="bold">5</text>
  <text x="345" y="215" text-anchor="middle" fill="#f22e0d" font-size="13" font-weight="bold">SAP Booking (Knjizenje)</text>
  <text x="345" y="240" fill="#b0b5b9" font-size="11">  Confirm produced quantities</text>
  <text x="345" y="258" fill="#b0b5b9" font-size="11">  Post material consumption</text>
  <text x="345" y="276" fill="#b0b5b9" font-size="11">  Record labor hours</text>

  <!-- Arrow down -->
  <line x1="345" y1="290" x2="345" y2="330" stroke="#949ca1" stroke-width="2" marker-end="url(#aFlow)"/>

  <!-- Step 7: Complete Order -->
  <rect x="225" y="335" width="240" height="70" rx="10" fill="rgba(46,204,113,0.2)" stroke="#2ecc71" stroke-width="2"/>
  <circle cx="250" cy="355" r="12" fill="#2ecc71"/>
  <text x="250" y="360" text-anchor="middle" fill="white" font-size="12" font-weight="bold">6</text>
  <text x="345" y="360" text-anchor="middle" fill="#2ecc71" font-size="13" font-weight="bold">Complete Order (Zavrsi nalog)</text>
  <text x="345" y="385" text-anchor="middle" fill="#a9dfbf" font-size="11">Final confirmation -> SAP order closed automatically</text>

  <!-- Arrow to SAP -->
  <line x1="465" y1="370" x2="530" y2="370" stroke="#949ca1" stroke-width="2" marker-end="url(#aFlow)"/>

  <!-- SAP confirmation box -->
  <rect x="535" y="335" width="220" height="70" rx="10" fill="rgba(242,46,13,0.15)" stroke="#f22e0d" stroke-width="1.5"/>
  <text x="645" y="360" text-anchor="middle" fill="#f22e0d" font-size="13" font-weight="bold">SAP Updated</text>
  <text x="645" y="380" text-anchor="middle" fill="#b0b5b9" font-size="11">Order closed, costs settled,</text>
  <text x="645" y="395" text-anchor="middle" fill="#b0b5b9" font-size="11">inventory adjusted</text>

  <!-- Bottom note -->
  <rect x="100" y="430" width="600" height="35" rx="8" fill="rgba(148,156,161,0.08)" stroke="rgba(148,156,161,0.3)" stroke-width="1"/>
  <text x="400" y="452" text-anchor="middle" fill="#949ca1" font-size="12">No manual SAP entry required - operators work only in InView, SAP stays in sync</text>
</svg>