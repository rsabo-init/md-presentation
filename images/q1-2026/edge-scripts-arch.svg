<svg width="960" height="580" viewBox="0 0 960 580" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="cloudFill" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#fff3f0"/>
      <stop offset="100%" stop-color="#ffeae5"/>
    </linearGradient>
    <linearGradient id="zoneFill" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#f8f6f4"/>
      <stop offset="100%" stop-color="#f2efec"/>
    </linearGradient>
    <linearGradient id="gwFill" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#eef2f8"/>
      <stop offset="100%" stop-color="#e4eaf4"/>
    </linearGradient>
    <linearGradient id="devFill" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#f2f2f2"/>
      <stop offset="100%" stop-color="#e8e8e8"/>
    </linearGradient>
    <marker id="arR" markerWidth="9" markerHeight="7" refX="8" refY="3.5" orient="auto">
      <polygon points="0 0,9 3.5,0 7" fill="#e23d21"/>
    </marker>
    <marker id="arG" markerWidth="9" markerHeight="7" refX="8" refY="3.5" orient="auto">
      <polygon points="0 0,9 3.5,0 7" fill="#aaaaaa"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="960" height="580" fill="#ffffff"/>

  <!-- ─── SUBTLE ZONE-TO-ZONE CONNECTION ─── -->
  <line x1="430" y1="370" x2="530" y2="370"
        stroke="#d8d8d8" stroke-width="1.5" stroke-dasharray="5,5"/>

  <!-- ─── CLOUD → ZONE ARROWS ─── -->
  <line x1="316" y1="172" x2="245" y2="228"
        stroke="#bbbbbb" stroke-width="1.8" stroke-dasharray="8,5" marker-end="url(#arG)"/>
  <line x1="304" y1="172" x2="233" y2="228"
        stroke="#bbbbbb" stroke-width="1.8" stroke-dasharray="8,5" marker-end="url(#arG)"/>
  <line x1="644" y1="172" x2="715" y2="228"
        stroke="#bbbbbb" stroke-width="1.8" stroke-dasharray="8,5" marker-end="url(#arG)"/>
  <line x1="656" y1="172" x2="727" y2="228"
        stroke="#bbbbbb" stroke-width="1.8" stroke-dasharray="8,5" marker-end="url(#arG)"/>

  <!-- ─── GATEWAY ↔ FIELD DEVICES ARROWS ─── -->
  <!-- Zone A: down arrow (gateway → field devices) -->
  <line x1="213" y1="419" x2="213" y2="452"
        stroke="#e23d21" stroke-width="2.5" marker-end="url(#arR)"/>
  <!-- Zone A: up arrow (field devices → gateway) -->
  <line x1="227" y1="455" x2="227" y2="422"
        stroke="#e23d21" stroke-width="2.5" marker-end="url(#arR)"/>
  <!-- Zone B: down arrow (gateway → field devices) -->
  <line x1="733" y1="419" x2="733" y2="452"
        stroke="#e23d21" stroke-width="2.5" marker-end="url(#arR)"/>
  <!-- Zone B: up arrow (field devices → gateway) -->
  <line x1="747" y1="455" x2="747" y2="422"
        stroke="#e23d21" stroke-width="2.5" marker-end="url(#arR)"/>

  <!-- ─── CLOUD ─── -->
  <path d="
    M 228,170
    C 225,132 240,108 266,100
    C 268,56 306,36 346,48
    C 356,14 394,2 428,14
    C 438,-12 467,-22 480,-22
    C 493,-22 522,-12 532,14
    C 566,2 604,14 614,48
    C 654,36 692,56 694,100
    C 720,108 735,132 732,170
    Z"
    fill="url(#cloudFill)" stroke="#e23d21" stroke-width="2"
    stroke-linejoin="round"/>

  <!-- Cloud content -->
  <text x="480" y="100" text-anchor="middle"
        font-family="'Roboto','Segoe UI',Arial,sans-serif" font-size="22" font-weight="700"
        fill="#171717">inView Cloud Platform</text>
  <!-- IWS Scripts badge -->
  <rect x="338" y="112" width="114" height="26" rx="13"
        fill="#e23d21" fill-opacity="0.12" stroke="#e23d21" stroke-width="1.4"/>
  <text x="395" y="129" text-anchor="middle"
        font-family="'Roboto','Segoe UI',Arial,sans-serif" font-size="12" font-weight="700"
