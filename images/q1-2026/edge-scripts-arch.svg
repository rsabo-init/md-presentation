        stroke-opacity="0.45"/>
  <text x="220" y="244" text-anchor="middle"
        font-family="'Roboto','Segoe UI',Arial,sans-serif" font-size="13" font-weight="700"
        fill="#e23d21" fill-opacity="0.75" letter-spacing="2">LOCATION A</text>

  <!-- i3x Gateway box (Zone A) -->
  <rect x="48" y="256" width="344" height="162" rx="12"
        fill="url(#gwFill)" stroke="#e23d21" stroke-width="1.6"/>
  <!-- Header bar -->
  <rect x="48" y="256" width="344" height="36" rx="12"
        fill="#e23d21" fill-opacity="0.08"/>
  <rect x="48" y="280" width="344" height="12"
        fill="#e23d21" fill-opacity="0.08"/>
  <!-- LED dots -->
  <circle cx="68"  cy="274" r="5" fill="#00aa44" opacity="0.9"/>
  <circle cx="84"  cy="274" r="5" fill="#e23d21" opacity="0.7"/>
  <circle cx="100" cy="274" r="5" fill="#e23d21" opacity="0.2"/>
  <!-- Gateway title -->
  <text x="220" y="275" text-anchor="middle"
        font-family="'Roboto','Segoe UI',Arial,sans-serif" font-size="15" font-weight="700"
