  <!-- Protocols -->
  <text x="220" y="354" text-anchor="middle"
        font-family="'Roboto','Segoe UI',Arial,sans-serif" font-size="11"
        fill="#999999">Modbus  ·  S7  ·  OPC UA</text>
  <!-- Port connectors -->
  <rect x="68"  y="398" width="14" height="10" rx="2" fill="#cccccc"/>
  <rect x="90"  y="398" width="14" height="10" rx="2" fill="#cccccc"/>
  <rect x="112" y="398" width="14" height="10" rx="2" fill="#cccccc"/>
  <rect x="134" y="398" width="14" height="10" rx="2" fill="#dddddd"/>

  <!-- Field Devices (Zone A) -->
  <rect x="60" y="456" width="320" height="74" rx="10"
