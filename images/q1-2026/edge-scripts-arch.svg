  <text x="532" y="129" text-anchor="middle"
        font-family="'Roboto','Segoe UI',Arial,sans-serif" font-size="11"
        fill="#888888">Variables · Alarms · History</text>
  <!-- Executed in cloud note -->
  <text x="480" y="158" text-anchor="middle"
        font-family="'Roboto','Segoe UI',Arial,sans-serif" font-size="10"
        fill="#aaaaaa" font-style="italic">executed in cloud</text>

  <!-- ─── LOCATION ZONE A ─── -->
  <rect x="22" y="220" width="396" height="326" rx="18"
