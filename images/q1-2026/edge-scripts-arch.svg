  <rect x="60" y="456" width="320" height="22" rx="10"
        fill="#171717" fill-opacity="0.03"/>
  <!-- Terminal blocks -->
  <rect x="78"  y="494" width="12" height="9" rx="2" fill="#cccccc" stroke="#bbbbbb" stroke-width="1"/>
  <rect x="98"  y="494" width="12" height="9" rx="2" fill="#cccccc" stroke="#bbbbbb" stroke-width="1"/>
  <rect x="118" y="494" width="12" height="9" rx="2" fill="#cccccc" stroke="#bbbbbb" stroke-width="1"/>
  <rect x="138" y="494" width="12" height="9" rx="2" fill="#dddddd" stroke="#cccccc" stroke-width="1"/>
  <text x="220" y="476" text-anchor="middle"
        font-family="'Roboto','Segoe UI',Arial,sans-serif" font-size="14" font-weight="700"
        fill="#171717">Field Devices</text>
  <text x="220" y="499" text-anchor="middle"
        font-family="'Roboto','Segoe UI',Arial,sans-serif" font-size="10"
        fill="#999999">PLCs  ·  Sensors  ·  Meters</text>
  <text x="220" y="518" text-anchor="middle"
        font-family="'Roboto','Segoe UI',Arial,sans-serif" font-size="10"
        fill="#bbbbbb">Modbus RTU  ·  Siemens S7</text>

  <!-- ─── LOCATION ZONE B ─── -->
  <rect x="542" y="220" width="396" height="326" rx="18"
        fill="url(#zoneFill)" stroke="#e23d21" stroke-width="1.5"
        stroke-opacity="0.45"/>
  <text x="740" y="244" text-anchor="middle"
        font-family="'Roboto','Segoe UI',Arial,sans-serif" font-size="13" font-weight="700"
        fill="#e23d21" fill-opacity="0.75" letter-spacing="2">LOCATION B</text>

  <!-- i3x Gateway (Zone B) -->
  <rect x="568" y="256" width="344" height="162" rx="12"
        fill="url(#gwFill)" stroke="#e23d21" stroke-width="1.6"/>
  <rect x="568" y="256" width="344" height="36" rx="12"
        fill="#e23d21" fill-opacity="0.08"/>
  <rect x="568" y="280" width="344" height="12"
        fill="#e23d21" fill-opacity="0.08"/>
  <circle cx="588" cy="274" r="5" fill="#00aa44" opacity="0.9"/>
  <circle cx="604" cy="274" r="5" fill="#e23d21" opacity="0.7"/>
  <circle cx="620" cy="274" r="5" fill="#e23d21" opacity="0.2"/>
  <text x="740" y="275" text-anchor="middle"
        font-family="'Roboto','Segoe UI',Arial,sans-serif" font-size="15" font-weight="700"
        fill="#171717">i3x Gateway</text>
  <rect x="582" y="302" width="134" height="26" rx="13"
        fill="#e23d21" fill-opacity="0.1" stroke="#e23d21" stroke-width="1.3"/>
  <text x="649" y="319" text-anchor="middle"
        font-family="'Roboto','Segoe UI',Arial,sans-serif" font-size="12" font-weight="700"
        fill="#e23d21">Edge Scripts</text>
  <rect x="724" y="302" width="118" height="26" rx="13"
        fill="#00aa44" fill-opacity="0.08" stroke="#00aa44" stroke-width="1.2"/>
  <text x="783" y="319" text-anchor="middle"
        font-family="'Roboto','Segoe UI',Arial,sans-serif" font-size="12" font-weight="700"
        fill="#00aa44">✓ Offline OK</text>
  <text x="740" y="354" text-anchor="middle"
        font-family="'Roboto','Segoe UI',Arial,sans-serif" font-size="11"
        fill="#999999">Modbus  ·  S7  ·  OPC UA</text>
  <rect x="588" y="398" width="14" height="10" rx="2" fill="#cccccc"/>
  <rect x="610" y="398" width="14" height="10" rx="2" fill="#cccccc"/>
  <rect x="632" y="398" width="14" height="10" rx="2" fill="#cccccc"/>
  <rect x="654" y="398" width="14" height="10" rx="2" fill="#dddddd"/>

  <!-- Field Devices (Zone B) -->
  <rect x="580" y="456" width="320" height="74" rx="10"
        fill="url(#devFill)" stroke="#cccccc" stroke-width="1.5"/>
  <rect x="580" y="456" width="320" height="22" rx="10"
        fill="#171717" fill-opacity="0.03"/>
  <rect x="598"  y="494" width="12" height="9" rx="2" fill="#cccccc" stroke="#bbbbbb" stroke-width="1"/>
  <rect x="618"  y="494" width="12" height="9" rx="2" fill="#cccccc" stroke="#bbbbbb" stroke-width="1"/>
  <rect x="638"  y="494" width="12" height="9" rx="2" fill="#cccccc" stroke="#bbbbbb" stroke-width="1"/>
  <rect x="658"  y="494" width="12" height="9" rx="2" fill="#dddddd" stroke="#cccccc" stroke-width="1"/>
  <text x="740" y="476" text-anchor="middle"
        font-family="'Roboto','Segoe UI',Arial,sans-serif" font-size="14" font-weight="700"
        fill="#171717">Field Devices</text>
  <text x="740" y="499" text-anchor="middle"
        font-family="'Roboto','Segoe UI',Arial,sans-serif" font-size="10"
        fill="#999999">PLCs  ·  Sensors  ·  Meters</text>
  <text x="740" y="518" text-anchor="middle"
        font-family="'Roboto','Segoe UI',Arial,sans-serif" font-size="10"
        fill="#bbbbbb">Modbus RTU  ·  Siemens S7</text>

  <!-- ─── LEGEND ─── -->
  <rect x="330" y="548" width="300" height="24" rx="8"
        fill="#f8f8f8" stroke="#e0e0e0" stroke-width="1"/>
  <line x1="346" y1="560" x2="366" y2="560" stroke="#aaaaaa" stroke-width="1.4" stroke-dasharray="5,3"/>
  <polygon points="366,557 372,560 366,563" fill="#aaaaaa"/>
  <text x="378" y="564"
        font-family="'Roboto','Segoe UI',Arial,sans-serif" font-size="9.5"
        fill="#999999">cloud sync (when online)</text>
</svg>
