<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 480" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <linearGradient id="bgSap" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#070707"/>
      <stop offset="100%" stop-color="#0f0f0f"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <marker id="arrRight" markerWidth="12" markerHeight="8" refX="11" refY="4" orient="auto">
      <polygon points="0 0, 12 4, 0 8" fill="#f22e0d"/>
    </marker>
    <marker id="arrLeft" markerWidth="12" markerHeight="8" refX="11" refY="4" orient="auto">
      <polygon points="0 0, 12 4, 0 8" fill="#2ecc71"/>
    </marker>
  </defs>
  <rect width="800" height="480" fill="url(#bgSap)" rx="12"/>

  <text x="400" y="35" text-anchor="middle" fill="#f22e0d" font-size="20" font-weight="bold">Bidirectional SAP &lt;&gt; InView Communication</text>

  <!-- SAP Box (left) -->
  <rect x="40" y="70" width="250" height="350" rx="12" fill="rgba(242,46,13,0.15)" stroke="#f22e0d" stroke-width="2"/>
  <rect x="90" y="80" width="150" height="40" rx="6" fill="#f22e0d"/>
  <text x="165" y="105" text-anchor="middle" fill="white" font-size="16" font-weight="bold">SAP ERP</text>

  <text x="165" y="150" text-anchor="middle" fill="#f22e0d" font-size="13" font-weight="bold">Master Data</text>
  <rect x="65" y="160" width="200" height="25" rx="4" fill="rgba(242,46,13,0.2)"/>
  <text x="165" y="177" text-anchor="middle" fill="#b0b5b9" font-size="11">Materials &amp; BOMs</text>
  <rect x="65" y="190" width="200" height="25" rx="4" fill="rgba(242,46,13,0.2)"/>
  <text x="165" y="207" text-anchor="middle" fill="#b0b5b9" font-size="11">Work Centers</text>
  <rect x="65" y="220" width="200" height="25" rx="4" fill="rgba(242,46,13,0.2)"/>
  <text x="165" y="237" text-anchor="middle" fill="#b0b5b9" font-size="11">Production Orders</text>

  <text x="165" y="275" text-anchor="middle" fill="#f22e0d" font-size="13" font-weight="bold">Planning</text>
  <rect x="65" y="285" width="200" height="25" rx="4" fill="rgba(242,46,13,0.2)"/>
  <text x="165" y="302" text-anchor="middle" fill="#b0b5b9" font-size="11">MPS Plans</text>
  <rect x="65" y="315" width="200" height="25" rx="4" fill="rgba(242,46,13,0.2)"/>
  <text x="165" y="332" text-anchor="middle" fill="#b0b5b9" font-size="11">Scheduling Data</text>
  <rect x="65" y="345" width="200" height="25" rx="4" fill="rgba(242,46,13,0.2)"/>
  <text x="165" y="362" text-anchor="middle" fill="#b0b5b9" font-size="11">Resource Allocation</text>

  <!-- InView Box (right) -->
  <rect x="510" y="70" width="250" height="350" rx="12" fill="rgba(46,204,113,0.15)" stroke="#2ecc71" stroke-width="2"/>
  <rect x="560" y="80" width="150" height="40" rx="6" fill="#2ecc71"/>
  <text x="635" y="105" text-anchor="middle" fill="white" font-size="16" font-weight="bold">InView MES</text>

  <text x="635" y="150" text-anchor="middle" fill="#2ecc71" font-size="13" font-weight="bold">Execution</text>
  <rect x="535" y="160" width="200" height="25" rx="4" fill="rgba(46,204,113,0.2)"/>
  <text x="635" y="177" text-anchor="middle" fill="#a9dfbf" font-size="11">Work Order Tracking</text>
  <rect x="535" y="190" width="200" height="25" rx="4" fill="rgba(46,204,113,0.2)"/>
  <text x="635" y="207" text-anchor="middle" fill="#a9dfbf" font-size="11">Real-time Production Data</text>
  <rect x="535" y="220" width="200" height="25" rx="4" fill="rgba(46,204,113,0.2)"/>
  <text x="635" y="237" text-anchor="middle" fill="#a9dfbf" font-size="11">Quality Metrics</text>

  <text x="635" y="275" text-anchor="middle" fill="#2ecc71" font-size="13" font-weight="bold">Feedback</text>
  <rect x="535" y="285" width="200" height="25" rx="4" fill="rgba(46,204,113,0.2)"/>
  <text x="635" y="302" text-anchor="middle" fill="#a9dfbf" font-size="11">Production Confirmations</text>
  <rect x="535" y="315" width="200" height="25" rx="4" fill="rgba(46,204,113,0.2)"/>
  <text x="635" y="332" text-anchor="middle" fill="#a9dfbf" font-size="11">Downtime Reports</text>
  <rect x="535" y="345" width="200" height="25" rx="4" fill="rgba(46,204,113,0.2)"/>
  <text x="635" y="362" text-anchor="middle" fill="#a9dfbf" font-size="11">Labor &amp; Material Usage</text>

  <!-- Arrows - SAP to InView (top two, pointing RIGHT) -->
  <line x1="290" y1="180" x2="510" y2="180" stroke="#f22e0d" stroke-width="3" marker-end="url(#arrRight)"/>
  <rect x="335" y="165" width="130" height="30" rx="6" fill="#070707" stroke="#f22e0d" stroke-width="1"/>
  <text x="400" y="184" text-anchor="middle" fill="#f22e0d" font-size="11" font-weight="bold">Orders &amp; Plans</text>

  <line x1="290" y1="230" x2="510" y2="230" stroke="#f22e0d" stroke-width="3" marker-end="url(#arrRight)"/>
  <rect x="335" y="215" width="130" height="30" rx="6" fill="#070707" stroke="#f22e0d" stroke-width="1"/>
  <text x="400" y="234" text-anchor="middle" fill="#f22e0d" font-size="11" font-weight="bold">Master Data</text>

  <!-- Arrows - InView to SAP (bottom two, pointing LEFT) -->
  <line x1="510" y1="310" x2="290" y2="310" stroke="#2ecc71" stroke-width="3" marker-end="url(#arrLeft)"/>
  <rect x="335" y="295" width="130" height="30" rx="6" fill="#070707" stroke="#2ecc71" stroke-width="1"/>
  <text x="400" y="314" text-anchor="middle" fill="#2ecc71" font-size="11" font-weight="bold">Confirmations</text>

  <line x1="510" y1="355" x2="290" y2="355" stroke="#2ecc71" stroke-width="3" marker-end="url(#arrLeft)"/>
  <rect x="330" y="340" width="140" height="30" rx="6" fill="#070707" stroke="#2ecc71" stroke-width="1"/>
  <text x="400" y="359" text-anchor="middle" fill="#2ecc71" font-size="11" font-weight="bold">Production Data</text>

  <!-- Legend -->
  <rect x="280" y="435" width="240" height="35" rx="6" fill="rgba(255,255,255,0.05)"/>
  <line x1="295" y1="452" x2="340" y2="452" stroke="#f22e0d" stroke-width="2"/>
  <polygon points="336,448 342,452 336,456" fill="#f22e0d"/>
  <text x="348" y="457" fill="#f22e0d" font-size="10">SAP to InView</text>
  <line x1="430" y1="452" x2="475" y2="452" stroke="#2ecc71" stroke-width="2"/>
  <polygon points="469,448 475,452 469,456" fill="#2ecc71"/>
  <text x="483" y="457" fill="#2ecc71" font-size="10">InView to SAP</text>
</svg>