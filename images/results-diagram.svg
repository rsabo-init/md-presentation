<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 450" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <linearGradient id="bgRes" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#070707"/>
      <stop offset="100%" stop-color="#0f0f0f"/>
    </linearGradient>
  </defs>
  <rect width="700" height="450" fill="url(#bgRes)" rx="12"/>

  <text x="350" y="35" text-anchor="middle" fill="#2ecc71" font-size="20" font-weight="bold">Key Results &amp; Benefits</text>

  <!-- Result cards - row 1 -->
  <rect x="30" y="55" width="200" height="115" rx="10" fill="rgba(46,204,113,0.12)" stroke="#2ecc71" stroke-width="1.5"/>
  <text x="130" y="85" text-anchor="middle" fill="#2ecc71" font-size="28" font-weight="bold">100%</text>
  <text x="130" y="105" text-anchor="middle" fill="#a9dfbf" font-size="12">Real-time Production</text>
  <text x="130" y="120" text-anchor="middle" fill="#a9dfbf" font-size="12">Monitoring</text>
  <text x="130" y="155" text-anchor="middle" fill="#7f8c8d" font-size="10">Continuous visibility</text>

  <rect x="250" y="55" width="200" height="115" rx="10" fill="rgba(242,46,13,0.12)" stroke="#f22e0d" stroke-width="1.5"/>
  <text x="350" y="85" text-anchor="middle" fill="#f22e0d" font-size="28" font-weight="bold">0</text>
  <text x="350" y="105" text-anchor="middle" fill="#ff6b52" font-size="12">Manual Data</text>
  <text x="350" y="120" text-anchor="middle" fill="#ff6b52" font-size="12">Entry Errors</text>
  <text x="350" y="155" text-anchor="middle" fill="#7f8c8d" font-size="10">Eliminated duplicates</text>

  <rect x="470" y="55" width="200" height="115" rx="10" fill="rgba(242,46,13,0.12)" stroke="#f22e0d" stroke-width="1.5"/>
  <text x="570" y="85" text-anchor="middle" fill="#f22e0d" font-size="28" font-weight="bold">2-way</text>
  <text x="570" y="105" text-anchor="middle" fill="#b0b5b9" font-size="12">SAP Integration</text>
  <text x="570" y="120" text-anchor="middle" fill="#b0b5b9" font-size="12">Fully Automated</text>
  <text x="570" y="155" text-anchor="middle" fill="#7f8c8d" font-size="10">Seamless data flow</text>

  <!-- Result cards - row 2 -->
  <rect x="30" y="190" width="200" height="115" rx="10" fill="rgba(78,85,89,0.12)" stroke="#4e5559" stroke-width="1.5"/>
  <text x="130" y="220" text-anchor="middle" fill="#4e5559" font-size="22" font-weight="bold">Faster</text>
  <text x="130" y="245" text-anchor="middle" fill="#b0b5b9" font-size="12">Decision Making</text>
  <text x="130" y="260" text-anchor="middle" fill="#b0b5b9" font-size="12">with Actionable Insights</text>
  <text x="130" y="292" text-anchor="middle" fill="#7f8c8d" font-size="10">Data-driven operations</text>

  <rect x="250" y="190" width="200" height="115" rx="10" fill="rgba(46,204,113,0.12)" stroke="#2ecc71" stroke-width="1.5"/>
  <text x="350" y="220" text-anchor="middle" fill="#2ecc71" font-size="22" font-weight="bold">Reduced</text>
  <text x="350" y="245" text-anchor="middle" fill="#a9dfbf" font-size="12">Downtime &amp;</text>
  <text x="350" y="260" text-anchor="middle" fill="#a9dfbf" font-size="12">Production Losses</text>
  <text x="350" y="292" text-anchor="middle" fill="#7f8c8d" font-size="10">Rapid response capability</text>

  <rect x="470" y="190" width="200" height="115" rx="10" fill="rgba(242,46,13,0.12)" stroke="#f22e0d" stroke-width="1.5"/>
  <text x="570" y="220" text-anchor="middle" fill="#f22e0d" font-size="22" font-weight="bold">Full</text>
  <text x="570" y="245" text-anchor="middle" fill="#ff6b52" font-size="12">Transparency</text>
  <text x="570" y="260" text-anchor="middle" fill="#ff6b52" font-size="12">of Work Orders</text>
  <text x="570" y="292" text-anchor="middle" fill="#7f8c8d" font-size="10">End-to-end tracking</text>

  <!-- Bottom summary bar -->
  <rect x="30" y="330" width="640" height="55" rx="10" fill="rgba(46,204,113,0.1)" stroke="#2ecc71" stroke-width="1" stroke-dasharray="6,3"/>
  <text x="350" y="352" text-anchor="middle" fill="#2ecc71" font-size="14" font-weight="bold">Combined Impact Across Both Plants</text>
  <text x="350" y="372" text-anchor="middle" fill="#a9dfbf" font-size="12">Higher efficiency | Lower admin overhead | Better quality control | Standardized processes</text>

  <!-- Timeline -->
  <line x1="100" y1="420" x2="600" y2="420" stroke="rgba(255,255,255,0.2)" stroke-width="2"/>
  <circle cx="150" cy="420" r="6" fill="#f22e0d"/>
  <text x="150" y="443" text-anchor="middle" fill="#f22e0d" font-size="10" font-weight="bold">2016</text>
  <text x="150" y="410" text-anchor="middle" fill="#bdc3c7" font-size="9">PVC Start</text>
  <circle cx="400" cy="420" r="6" fill="#f22e0d"/>
  <text x="400" y="443" text-anchor="middle" fill="#f22e0d" font-size="10" font-weight="bold">2021</text>
  <text x="400" y="410" text-anchor="middle" fill="#bdc3c7" font-size="9">Wood Start</text>
  <circle cx="560" cy="420" r="6" fill="#2ecc71"/>
  <text x="560" y="443" text-anchor="middle" fill="#2ecc71" font-size="10" font-weight="bold">Today</text>
  <text x="560" y="410" text-anchor="middle" fill="#bdc3c7" font-size="9">Ongoing Dev</text>
