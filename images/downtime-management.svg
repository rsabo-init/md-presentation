<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 750 500" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <linearGradient id="bgDt" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#070707"/>
      <stop offset="100%" stop-color="#0f0f0f"/>
    </linearGradient>
    <marker id="arrowRedDt" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#f22e0d"/>
    </marker>
  </defs>
  <rect width="750" height="500" fill="url(#bgDt)" rx="12"/>

  <text x="375" y="32" text-anchor="middle" fill="#f22e0d" font-size="18" font-weight="bold">Downtime Management &amp; Reporting</text>

  <!-- === PRIMARY TRIGGER: Sensors / PLCs === -->
  <rect x="30" y="48" width="690" height="68" rx="10" fill="rgba(242,46,13,0.12)" stroke="#f22e0d" stroke-width="2"/>
  <text x="50" y="71" fill="#f22e0d" font-size="12" font-weight="bold">PRIMARY TRIGGER</text>
  <rect x="155" y="56" width="120" height="20" rx="4" fill="rgba(242,46,13,0.3)" stroke="#f22e0d" stroke-width="1"/>
  <text x="215" y="71" text-anchor="middle" fill="white" font-size="11" font-weight="bold">Sensors / PLCs</text>
  <text x="295" y="71" fill="#fab1a0" font-size="11">  ·  Machine stop signal  ·  Speed = 0  ·  Drive fault  ·  No encoder pulses</text>
  <text x="50" y="100" fill="#bdc3c7" font-size="11">InView continuously reads PLC &amp; sensor data — the moment a stop is detected, a downtime event is automatically opened</text>

  <!-- Arrow from Sensors row down to Event Occurs box (centered on Event Occurs box x=110) -->
  <line x1="110" y1="117" x2="110" y2="136" stroke="#f22e0d" stroke-width="2.5" marker-end="url(#arrowRedDt)"/>

  <!-- Step 1 - Event Occurs (shifted to y=140) -->
  <rect x="30" y="140" width="160" height="128" rx="10" fill="rgba(231,76,60,0.15)" stroke="#e74c3c" stroke-width="2"/>
  <circle cx="110" cy="162" r="16" fill="#e74c3c"/>
  <text x="110" y="168" text-anchor="middle" fill="white" font-size="13" font-weight="bold">!</text>
  <text x="110" y="196" text-anchor="middle" fill="#e74c3c" font-size="13" font-weight="bold">Event Occurs</text>
  <text x="110" y="215" text-anchor="middle" fill="#fab1a0" font-size="10">Machine breakdown</text>
  <text x="110" y="230" text-anchor="middle" fill="#fab1a0" font-size="10">Material shortage</text>
  <text x="110" y="245" text-anchor="middle" fill="#fab1a0" font-size="10">Quality issue</text>
  <text x="110" y="260" text-anchor="middle" fill="#fab1a0" font-size="10">Planned maintenance</text>

  <polygon points="190,205 210,195 210,190 225,200 210,210 210,205" fill="#949ca1"/>

  <!-- Step 2 - Operator Records -->
  <rect x="230" y="140" width="160" height="128" rx="10" fill="rgba(148,156,161,0.15)" stroke="#949ca1" stroke-width="2"/>
  <text x="310" y="163" text-anchor="middle" fill="#949ca1" font-size="13" font-weight="bold">Operator Records</text>
  <text x="310" y="183" text-anchor="middle" fill="#f22e0d" font-size="10" font-weight="bold">⚡ Alert shown by InView</text>
  <text x="310" y="200" text-anchor="middle" fill="#bdc3c7" font-size="10">Click "Zastoj" button</text>
  <text x="310" y="218" text-anchor="middle" fill="#bdc3c7" font-size="10">Select reason code</text>
  <text x="310" y="236" text-anchor="middle" fill="#bdc3c7" font-size="10">Add description</text>
  <text x="310" y="254" text-anchor="middle" fill="#7f8c8d" font-size="10">Links to active order</text>

  <polygon points="390,205 410,195 410,190 425,200 410,210 410,205" fill="#949ca1"/>

  <!-- Step 3 - Categorized -->
  <rect x="430" y="140" width="145" height="128" rx="10" fill="rgba(78,85,89,0.15)" stroke="#4e5559" stroke-width="2"/>
  <text x="502" y="163" text-anchor="middle" fill="#4e5559" font-size="13" font-weight="bold">Categorized</text>
  <text x="502" y="185" text-anchor="middle" fill="#b0b5b9" font-size="10">Mechanical</text>
  <text x="502" y="203" text-anchor="middle" fill="#b0b5b9" font-size="10">Electrical</text>
  <text x="502" y="221" text-anchor="middle" fill="#b0b5b9" font-size="10">Material</text>
  <text x="502" y="239" text-anchor="middle" fill="#b0b5b9" font-size="10">Organizational</text>
  <text x="502" y="257" text-anchor="middle" fill="#b0b5b9" font-size="10">Quality</text>

  <polygon points="575,205 595,195 595,190 610,200 595,210 595,205" fill="#949ca1"/>

  <!-- Step 4 - Synced to SAP -->
  <rect x="615" y="140" width="110" height="128" rx="10" fill="rgba(46,204,113,0.15)" stroke="#2ecc71" stroke-width="2"/>
  <text x="670" y="163" text-anchor="middle" fill="#2ecc71" font-size="13" font-weight="bold">Synced</text>
  <text x="670" y="188" text-anchor="middle" fill="#a9dfbf" font-size="10">SAP PM</text>
  <text x="670" y="206" text-anchor="middle" fill="#a9dfbf" font-size="10">module</text>
  <text x="670" y="228" text-anchor="middle" fill="#7f8c8d" font-size="10">Auto-posted</text>
  <text x="670" y="245" text-anchor="middle" fill="#7f8c8d" font-size="10">maintenance</text>
  <text x="670" y="262" text-anchor="middle" fill="#7f8c8d" font-size="10">notifications</text>

  <!-- Analytics section -->
  <rect x="30" y="295" width="695" height="183" rx="10" fill="rgba(242,46,13,0.08)" stroke="rgba(242,46,13,0.4)" stroke-width="1.5"/>
  <text x="375" y="319" text-anchor="middle" fill="#f22e0d" font-size="14" font-weight="bold">Downtime Analytics &amp; KPIs (Available in InView Reports)</text>

  <!-- KPI boxes -->
  <rect x="50" y="337" width="150" height="55" rx="6" fill="rgba(231,76,60,0.1)" stroke="#e74c3c" stroke-width="1"/>
  <text x="125" y="361" text-anchor="middle" fill="#e74c3c" font-size="18" font-weight="bold">MTBF</text>
  <text x="125" y="380" text-anchor="middle" fill="#bdc3c7" font-size="10">Mean Time Between Failures</text>

  <rect x="220" y="337" width="150" height="55" rx="6" fill="rgba(148,156,161,0.1)" stroke="#949ca1" stroke-width="1"/>
  <text x="295" y="361" text-anchor="middle" fill="#949ca1" font-size="18" font-weight="bold">MTTR</text>
  <text x="295" y="380" text-anchor="middle" fill="#bdc3c7" font-size="10">Mean Time To Repair</text>

  <rect x="390" y="337" width="150" height="55" rx="6" fill="rgba(46,204,113,0.1)" stroke="#2ecc71" stroke-width="1"/>
  <text x="465" y="361" text-anchor="middle" fill="#2ecc71" font-size="18" font-weight="bold">OEE</text>
  <text x="465" y="380" text-anchor="middle" fill="#bdc3c7" font-size="10">Overall Equipment Effectiveness</text>

  <rect x="560" y="337" width="150" height="55" rx="6" fill="rgba(242,46,13,0.1)" stroke="#f22e0d" stroke-width="1"/>
  <text x="635" y="361" text-anchor="middle" fill="#f22e0d" font-size="18" font-weight="bold">Top 5</text>
  <text x="635" y="380" text-anchor="middle" fill="#bdc3c7" font-size="10">Pareto of Stoppage Causes</text>

  <text x="375" y="457" text-anchor="middle" fill="#7f8c8d" font-size="11">All metrics calculated automatically from recorded downtime events - no manual reporting needed</text>
</svg>
