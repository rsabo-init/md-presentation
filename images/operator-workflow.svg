<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 480" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <linearGradient id="bgOp" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#070707"/>
      <stop offset="100%" stop-color="#0f0f0f"/>
    </linearGradient>
  </defs>
  <rect width="800" height="480" fill="url(#bgOp)" rx="12"/>

  <text x="400" y="32" text-anchor="middle" fill="#f22e0d" font-size="18" font-weight="bold">Operator Daily Workflow in InView</text>

  <!-- Shift start -->
  <rect x="30" y="55" width="220" height="130" rx="10" fill="rgba(242,46,13,0.12)" stroke="#f22e0d" stroke-width="2"/>
  <rect x="45" y="62" width="90" height="24" rx="5" fill="#f22e0d"/>
  <text x="90" y="79" text-anchor="middle" fill="white" font-size="11" font-weight="bold">SHIFT START</text>
  <text x="140" y="105" text-anchor="middle" fill="#ff6b52" font-size="12" font-weight="bold">1. Take Over Shift</text>
  <text x="140" y="125" text-anchor="middle" fill="#bdc3c7" font-size="10">"Preuzimanje smene"</text>
  <text x="140" y="145" text-anchor="middle" fill="#7f8c8d" font-size="10">Review previous shift notes</text>
  <text x="140" y="160" text-anchor="middle" fill="#7f8c8d" font-size="10">Check current order status</text>
  <text x="140" y="175" text-anchor="middle" fill="#7f8c8d" font-size="10">View planned orders (MPS)</text>

  <!-- Arrow -->
  <line x1="250" y1="120" x2="290" y2="120" stroke="rgba(255,255,255,0.3)" stroke-width="2"/>
  <polygon points="288,114 298,120 288,126" fill="rgba(255,255,255,0.3)"/>

  <!-- Work order operations -->
  <rect x="295" y="55" width="220" height="130" rx="10" fill="rgba(46,204,113,0.12)" stroke="#2ecc71" stroke-width="2"/>
  <rect x="310" y="62" width="115" height="24" rx="5" fill="#2ecc71"/>
  <text x="367" y="79" text-anchor="middle" fill="white" font-size="11" font-weight="bold">PRODUCTION</text>
  <text x="405" y="105" text-anchor="middle" fill="#a9dfbf" font-size="12" font-weight="bold">2. Run Work Orders</text>
  <text x="405" y="125" text-anchor="middle" fill="#bdc3c7" font-size="10">Monitor production params</text>
  <text x="405" y="145" text-anchor="middle" fill="#7f8c8d" font-size="10">Track cycles &amp; quantities</text>
  <text x="405" y="160" text-anchor="middle" fill="#7f8c8d" font-size="10">Record quality (A-class %)</text>
  <text x="405" y="175" text-anchor="middle" fill="#7f8c8d" font-size="10">View real-time yield</text>

  <!-- Arrow -->
  <line x1="515" y1="120" x2="555" y2="120" stroke="rgba(255,255,255,0.3)" stroke-width="2"/>
  <polygon points="553,114 563,120 553,126" fill="rgba(255,255,255,0.3)"/>

  <!-- Events & exceptions -->
  <rect x="560" y="55" width="210" height="130" rx="10" fill="rgba(231,76,60,0.12)" stroke="#e74c3c" stroke-width="2"/>
  <rect x="575" y="62" width="80" height="24" rx="5" fill="#e74c3c"/>
  <text x="615" y="79" text-anchor="middle" fill="white" font-size="11" font-weight="bold">EVENTS</text>
  <text x="665" y="105" text-anchor="middle" fill="#fab1a0" font-size="12" font-weight="bold">3. Handle Events</text>
  <text x="665" y="125" text-anchor="middle" fill="#bdc3c7" font-size="10">Record downtimes</text>
  <text x="665" y="145" text-anchor="middle" fill="#7f8c8d" font-size="10">Pause/resume orders</text>
  <text x="665" y="160" text-anchor="middle" fill="#7f8c8d" font-size="10">Log identified problems</text>
  <text x="665" y="175" text-anchor="middle" fill="#7f8c8d" font-size="10">Respond to alarms</text>

  <!-- Second row -->
  <!-- Booking -->
  <rect x="30" y="225" width="220" height="120" rx="10" fill="rgba(242,46,13,0.12)" stroke="#f22e0d" stroke-width="2"/>
  <rect x="45" y="232" width="85" height="24" rx="5" fill="#f22e0d"/>
  <text x="87" y="249" text-anchor="middle" fill="white" font-size="11" font-weight="bold">BOOKING</text>
  <text x="140" y="275" text-anchor="middle" fill="#b0b5b9" font-size="12" font-weight="bold">4. SAP Confirmations</text>
  <text x="140" y="295" text-anchor="middle" fill="#bdc3c7" font-size="10">Click "Knjizenje" to confirm</text>
  <text x="140" y="315" text-anchor="middle" fill="#7f8c8d" font-size="10">Quantities auto-posted to SAP</text>
  <text x="140" y="330" text-anchor="middle" fill="#7f8c8d" font-size="10">No SAP login needed!</text>

  <!-- Arrow -->
  <line x1="250" y1="285" x2="290" y2="285" stroke="rgba(255,255,255,0.3)" stroke-width="2"/>
  <polygon points="288,279 298,285 288,291" fill="rgba(255,255,255,0.3)"/>

  <!-- Order completion -->
  <rect x="295" y="225" width="220" height="120" rx="10" fill="rgba(78,85,89,0.12)" stroke="#4e5559" stroke-width="2"/>
  <rect x="310" y="232" width="110" height="24" rx="5" fill="#4e5559"/>
  <text x="365" y="249" text-anchor="middle" fill="white" font-size="11" font-weight="bold">COMPLETE</text>
  <text x="405" y="275" text-anchor="middle" fill="#b0b5b9" font-size="12" font-weight="bold">5. Close Work Order</text>
  <text x="405" y="295" text-anchor="middle" fill="#bdc3c7" font-size="10">"Zavrsi nalog" button</text>
  <text x="405" y="315" text-anchor="middle" fill="#7f8c8d" font-size="10">Final quantities confirmed</text>
  <text x="405" y="330" text-anchor="middle" fill="#7f8c8d" font-size="10">SAP order auto-closed</text>

  <!-- Arrow -->
  <line x1="515" y1="285" x2="555" y2="285" stroke="rgba(255,255,255,0.3)" stroke-width="2"/>
  <polygon points="553,279 563,285 553,291" fill="rgba(255,255,255,0.3)"/>

  <!-- Reporting -->
  <rect x="560" y="225" width="210" height="120" rx="10" fill="rgba(148,156,161,0.12)" stroke="#949ca1" stroke-width="2"/>
  <rect x="575" y="232" width="85" height="24" rx="5" fill="#949ca1"/>
  <text x="617" y="249" text-anchor="middle" fill="white" font-size="11" font-weight="bold">REPORTS</text>
  <text x="665" y="275" text-anchor="middle" fill="#c0c5c9" font-size="12" font-weight="bold">6. Shift Reports</text>
  <text x="665" y="295" text-anchor="middle" fill="#bdc3c7" font-size="10">Review shift production</text>
  <text x="665" y="315" text-anchor="middle" fill="#7f8c8d" font-size="10">Check KPIs &amp; statistics</text>
  <text x="665" y="330" text-anchor="middle" fill="#7f8c8d" font-size="10">Handover to next shift</text>

  <!-- Key insight box -->
  <rect x="60" y="380" width="680" height="80" rx="10" fill="rgba(46,204,113,0.08)" stroke="#2ecc71" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="400" y="405" text-anchor="middle" fill="#2ecc71" font-size="14" font-weight="bold">Key Operations Insight</text>
  <text x="400" y="425" text-anchor="middle" fill="#a9dfbf" font-size="12">Operators NEVER need to open SAP directly</text>
  <text x="400" y="445" text-anchor="middle" fill="#bdc3c7" font-size="11">All interactions happen through InView's shop-floor-friendly interface -> data flows to SAP automatically</text>
</svg>