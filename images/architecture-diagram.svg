<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 520" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#070707"/>
      <stop offset="100%" stop-color="#0f0f0f"/>
    </linearGradient>
    <linearGradient id="box1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f22e0d"/>
      <stop offset="100%" stop-color="#7c2516"/>
    </linearGradient>
    <linearGradient id="box2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2ecc71"/>
      <stop offset="100%" stop-color="#27ae60"/>
    </linearGradient>
    <linearGradient id="box3" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f22e0d"/>
      <stop offset="100%" stop-color="#b01c09"/>
    </linearGradient>
    <linearGradient id="box4" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4e5559"/>
      <stop offset="100%" stop-color="#3a3d40"/>
    </linearGradient>
    <linearGradient id="box5" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#949ca1"/>
      <stop offset="100%" stop-color="#6b7278"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="2" dy="3" stdDeviation="4" flood-opacity="0.4"/>
    </filter>
    <marker id="arrowRed" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#f22e0d"/>
    </marker>
    <marker id="arrowGreen" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2ecc71"/>
    </marker>
  </defs>
  <rect width="800" height="520" fill="url(#bg)" rx="12"/>

  <!-- Title -->
  <text x="400" y="40" text-anchor="middle" fill="#f22e0d" font-size="22" font-weight="bold">InView Platform Architecture</text>

  <!-- SAP Layer (top) -->
  <rect x="250" y="60" width="300" height="60" rx="10" fill="url(#box1)" filter="url(#shadow)"/>
  <text x="400" y="87" text-anchor="middle" fill="white" font-size="16" font-weight="bold">SAP ERP System</text>
  <text x="400" y="107" text-anchor="middle" fill="#ffb0a0" font-size="12">Enterprise Resource Planning</text>

  <!-- Bidirectional arrows SAP <-> InView -->
  <line x1="350" y1="120" x2="350" y2="170" stroke="#f22e0d" stroke-width="3" marker-end="url(#arrowRed)"/>
  <line x1="450" y1="170" x2="450" y2="120" stroke="#f22e0d" stroke-width="3" marker-end="url(#arrowRed)"/>
  <text x="400" y="152" text-anchor="middle" fill="#f22e0d" font-size="11" font-weight="bold">Bidirectional</text>

  <!-- InView Platform (center - large) -->
  <rect x="100" y="175" width="600" height="120" rx="12" fill="none" stroke="#2ecc71" stroke-width="2" stroke-dasharray="8,4"/>
  <rect x="120" y="185" width="560" height="100" rx="10" fill="url(#box2)" filter="url(#shadow)" opacity="0.9"/>
  <text x="400" y="215" text-anchor="middle" fill="white" font-size="20" font-weight="bold">InView SCADA Platform</text>
  <text x="200" y="245" text-anchor="middle" fill="#d5f5e3" font-size="12">Real-time Monitoring</text>
  <text x="350" y="245" text-anchor="middle" fill="#d5f5e3" font-size="12">Process Control</text>
  <text x="500" y="245" text-anchor="middle" fill="#d5f5e3" font-size="12">Data Collection</text>
  <text x="650" y="245" text-anchor="middle" fill="#d5f5e3" font-size="12">Alarming</text>
  <text x="400" y="270" text-anchor="middle" fill="#a9dfbf" font-size="11">MES Module: Production Planning | Work Orders | Labor Tracking | Quality</text>

  <!-- Arrows InView -> Shop Floor -->
  <line x1="200" y1="295" x2="200" y2="335" stroke="#f22e0d" stroke-width="2" marker-end="url(#arrowRed)"/>
  <line x1="600" y1="295" x2="600" y2="335" stroke="#f22e0d" stroke-width="2" marker-end="url(#arrowRed)"/>

  <!-- Shop Floor Layer - PVC Production -->
  <rect x="60" y="340" width="200" height="70" rx="8" fill="url(#box3)" filter="url(#shadow)"/>
  <text x="160" y="365" text-anchor="middle" fill="white" font-size="14" font-weight="bold">PVC Production</text>
  <text x="160" y="383" text-anchor="middle" fill="#ffb0a0" font-size="11">Continuous Processing</text>
  <text x="160" y="396" text-anchor="middle" fill="#ffb0a0" font-size="10">Since 2016</text>

  <!-- Shop Floor Layer - Wood Production -->
  <rect x="540" y="340" width="200" height="70" rx="8" fill="url(#box3)" filter="url(#shadow)"/>
  <text x="640" y="365" text-anchor="middle" fill="white" font-size="14" font-weight="bold">Wood Production</text>
  <text x="640" y="383" text-anchor="middle" fill="#ffb0a0" font-size="11">Wood Processing Lines</text>
  <text x="640" y="396" text-anchor="middle" fill="#ffb0a0" font-size="10">Since 2021</text>

  <!-- PLCs & Sensors under PVC -->
  <line x1="120" y1="410" x2="120" y2="435" stroke="#949ca1" stroke-width="1.5" stroke-dasharray="3,2"/>
  <rect x="60" y="438" width="130" height="50" rx="6" fill="url(#box4)" filter="url(#shadow)"/>
  <text x="125" y="460" text-anchor="middle" fill="white" font-size="11" font-weight="bold">PLCs &amp; Sensors</text>
  <text x="125" y="478" text-anchor="middle" fill="#c0c5c9" font-size="9">PVC Field Devices</text>

  <!-- Operator Inputs under PVC -->
  <line x1="200" y1="410" x2="200" y2="435" stroke="#949ca1" stroke-width="1.5" stroke-dasharray="3,2"/>
  <rect x="200" y="438" width="130" height="50" rx="6" fill="url(#box5)" filter="url(#shadow)"/>
  <text x="265" y="460" text-anchor="middle" fill="white" font-size="11" font-weight="bold">Operator Inputs</text>
  <text x="265" y="478" text-anchor="middle" fill="#d0d5d9" font-size="9">Manual Data Entry</text>

  <!-- PLCs & Sensors under Wood -->
  <line x1="600" y1="410" x2="600" y2="435" stroke="#949ca1" stroke-width="1.5" stroke-dasharray="3,2"/>
  <rect x="540" y="438" width="130" height="50" rx="6" fill="url(#box4)" filter="url(#shadow)"/>
  <text x="605" y="460" text-anchor="middle" fill="white" font-size="11" font-weight="bold">PLCs &amp; Sensors</text>
  <text x="605" y="478" text-anchor="middle" fill="#c0c5c9" font-size="9">Wood Field Devices</text>

  <!-- Operator Inputs under Wood -->
  <line x1="680" y1="410" x2="680" y2="435" stroke="#949ca1" stroke-width="1.5" stroke-dasharray="3,2"/>
  <rect x="680" y="438" width="130" height="50" rx="6" fill="url(#box5)" filter="url(#shadow)"/>
  <text x="745" y="460" text-anchor="middle" fill="white" font-size="11" font-weight="bold">Operator Inputs</text>
  <text x="745" y="478" text-anchor="middle" fill="#d0d5d9" font-size="9">Manual Data Entry</text>

  <!-- Center label between the two production areas -->
  <rect x="300" y="350" width="200" height="50" rx="8" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>
  <text x="400" y="372" text-anchor="middle" fill="#bdc3c7" font-size="11">Operators | Shift Managers</text>
  <text x="400" y="389" text-anchor="middle" fill="#7f8c8d" font-size="10">Web-based access</text>
</svg>