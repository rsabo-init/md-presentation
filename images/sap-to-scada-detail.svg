<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <linearGradient id="bgS2S" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#070707"/>
      <stop offset="100%" stop-color="#0f0f0f"/>
    </linearGradient>
    <marker id="aRight" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#f22e0d"/>
    </marker>
  </defs>
  <rect width="800" height="500" fill="url(#bgS2S)" rx="12"/>

  <text x="400" y="35" text-anchor="middle" fill="#f22e0d" font-size="20" font-weight="bold">SAP -> InView: What Data Flows Down?</text>

  <!-- SAP source box -->
  <rect x="30" y="55" width="180" height="420" rx="10" fill="rgba(242,46,13,0.12)" stroke="#f22e0d" stroke-width="2"/>
  <rect x="55" y="65" width="130" height="36" rx="6" fill="#f22e0d"/>
  <text x="120" y="88" text-anchor="middle" fill="white" font-size="15" font-weight="bold">SAP ERP</text>

  <!-- Data categories flowing right -->
  <!-- 1. Production Orders -->
  <rect x="280" y="55" width="480" height="75" rx="8" fill="rgba(242,46,13,0.08)" stroke="rgba(242,46,13,0.4)" stroke-width="1"/>
  <line x1="210" y1="92" x2="275" y2="92" stroke="#f22e0d" stroke-width="2" marker-end="url(#aRight)"/>
  <text x="300" y="75" fill="#f22e0d" font-size="14" font-weight="bold">Production Orders (PP-PI)</text>
  <text x="300" y="95" fill="#bdc3c7" font-size="11">Order ID, material number, planned quantity, BOM, routing</text>
  <text x="300" y="112" fill="#7f8c8d" font-size="11">Trigger: SAP releases order -> automatic sync to InView within seconds</text>

  <!-- 2. MPS Plans -->
  <rect x="280" y="145" width="480" height="75" rx="8" fill="rgba(242,46,13,0.08)" stroke="rgba(242,46,13,0.4)" stroke-width="1"/>
  <line x1="210" y1="182" x2="275" y2="182" stroke="#f22e0d" stroke-width="2" marker-end="url(#aRight)"/>
  <text x="300" y="165" fill="#f22e0d" font-size="14" font-weight="bold">MPS Plans &amp; Scheduling</text>
  <text x="300" y="185" fill="#bdc3c7" font-size="11">Weekly production plans, sequence, planned start/end times</text>
  <text x="300" y="202" fill="#7f8c8d" font-size="11">Operators see upcoming plan directly on shop floor screens</text>

  <!-- 3. Master Data -->
  <rect x="280" y="235" width="480" height="75" rx="8" fill="rgba(242,46,13,0.08)" stroke="rgba(242,46,13,0.4)" stroke-width="1"/>
  <line x1="210" y1="272" x2="275" y2="272" stroke="#f22e0d" stroke-width="2" marker-end="url(#aRight)"/>
  <text x="300" y="255" fill="#f22e0d" font-size="14" font-weight="bold">Master Data Sync</text>
  <text x="300" y="275" fill="#bdc3c7" font-size="11">Materials, work centers, BOMs, process parameters, recipes</text>
  <text x="300" y="292" fill="#7f8c8d" font-size="11">Single source of truth - no duplicate maintenance needed</text>

  <!-- 4. Work Centers -->
  <rect x="280" y="325" width="480" height="75" rx="8" fill="rgba(242,46,13,0.08)" stroke="rgba(242,46,13,0.4)" stroke-width="1"/>
  <line x1="210" y1="362" x2="275" y2="362" stroke="#f22e0d" stroke-width="2" marker-end="url(#aRight)"/>
  <text x="300" y="345" fill="#f22e0d" font-size="14" font-weight="bold">Resource &amp; Capacity Data</text>
  <text x="300" y="365" fill="#bdc3c7" font-size="11">Machine capabilities, shift calendars, capacity constraints</text>
  <text x="300" y="382" fill="#7f8c8d" font-size="11">Enables realistic scheduling at plant level</text>

  <!-- 5. Quality Specs -->
  <rect x="280" y="415" width="480" height="65" rx="8" fill="rgba(242,46,13,0.08)" stroke="rgba(242,46,13,0.4)" stroke-width="1"/>
  <line x1="210" y1="447" x2="275" y2="447" stroke="#f22e0d" stroke-width="2" marker-end="url(#aRight)"/>
  <text x="300" y="435" fill="#f22e0d" font-size="14" font-weight="bold">Quality Parameters &amp; Specs</text>
  <text x="300" y="455" fill="#bdc3c7" font-size="11">Inspection plans, tolerance limits, quality class definitions (A-class targets)</text>

  <!-- SAP internal items -->
  <text x="120" y="130" text-anchor="middle" fill="#b0b5b9" font-size="10">PP Module</text>
  <text x="120" y="180" text-anchor="middle" fill="#b0b5b9" font-size="10">PP-MPS</text>
  <text x="120" y="270" text-anchor="middle" fill="#b0b5b9" font-size="10">MM / PP</text>
  <text x="120" y="360" text-anchor="middle" fill="#b0b5b9" font-size="10">PP-CRP</text>
  <text x="120" y="445" text-anchor="middle" fill="#b0b5b9" font-size="10">QM</text>
</svg>