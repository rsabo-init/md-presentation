<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <linearGradient id="bgPp" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#070707"/>
      <stop offset="100%" stop-color="#0f0f0f"/>
    </linearGradient>
    <marker id="aPp" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#949ca1"/>
    </marker>
    <marker id="aPpRed" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#f22e0d"/>
    </marker>
  </defs>
  <rect width="800" height="450" fill="url(#bgPp)" rx="12"/>

  <text x="400" y="32" text-anchor="middle" fill="#949ca1" font-size="18" font-weight="bold">Production Planning: From SAP MPS to Shop Floor Execution</text>

  <!-- Layer labels -->
  <text x="25" y="80" fill="#f22e0d" font-size="11" font-weight="bold" transform="rotate(-90,25,120)">SAP LEVEL</text>
  <text x="25" y="230" fill="#2ecc71" font-size="11" font-weight="bold" transform="rotate(-90,25,270)">InView MES</text>
  <text x="25" y="370" fill="#f22e0d" font-size="11" font-weight="bold" transform="rotate(-90,25,400)">SHOP FLOOR</text>

  <!-- Divider lines -->
  <line x1="50" y1="155" x2="770" y2="155" stroke="rgba(255,255,255,0.1)" stroke-width="1" stroke-dasharray="5,5"/>
  <line x1="50" y1="330" x2="770" y2="330" stroke="rgba(255,255,255,0.1)" stroke-width="1" stroke-dasharray="5,5"/>

  <!-- SAP Level -->
  <rect x="60" y="55" width="155" height="80" rx="8" fill="rgba(242,46,13,0.15)" stroke="#f22e0d" stroke-width="1.5"/>
  <text x="137" y="80" text-anchor="middle" fill="#f22e0d" font-size="13" font-weight="bold">MPS Plan</text>
  <text x="137" y="100" text-anchor="middle" fill="#b0b5b9" font-size="10">Weekly schedule</text>
  <text x="137" y="115" text-anchor="middle" fill="#b0b5b9" font-size="10">W44_2025, W45_2025...</text>

  <line x1="215" y1="95" x2="255" y2="95" stroke="#949ca1" stroke-width="2" marker-end="url(#aPp)"/>

  <rect x="260" y="55" width="155" height="80" rx="8" fill="rgba(242,46,13,0.15)" stroke="#f22e0d" stroke-width="1.5"/>
  <text x="337" y="80" text-anchor="middle" fill="#f22e0d" font-size="13" font-weight="bold">Prod. Orders</text>
  <text x="337" y="100" text-anchor="middle" fill="#b0b5b9" font-size="10">Order #19370</text>
  <text x="337" y="115" text-anchor="middle" fill="#b0b5b9" font-size="10">Material, qty, routing</text>

  <line x1="415" y1="95" x2="455" y2="95" stroke="#949ca1" stroke-width="2" marker-end="url(#aPp)"/>

  <rect x="460" y="55" width="155" height="80" rx="8" fill="rgba(242,46,13,0.15)" stroke="#f22e0d" stroke-width="1.5"/>
  <text x="537" y="80" text-anchor="middle" fill="#f22e0d" font-size="13" font-weight="bold">Release</text>
  <text x="537" y="100" text-anchor="middle" fill="#b0b5b9" font-size="10">Order status: REL</text>
  <text x="537" y="115" text-anchor="middle" fill="#b0b5b9" font-size="10">Triggers sync to InView</text>

  <!-- Arrow down to InView -->
  <line x1="537" y1="135" x2="537" y2="175" stroke="#949ca1" stroke-width="2" marker-end="url(#aPp)"/>

  <!-- InView MES Level -->
  <rect x="60" y="175" width="155" height="140" rx="8" fill="rgba(46,204,113,0.12)" stroke="#2ecc71" stroke-width="1.5"/>
  <text x="137" y="200" text-anchor="middle" fill="#2ecc71" font-size="13" font-weight="bold">Planning View</text>
  <text x="137" y="220" text-anchor="middle" fill="#a9dfbf" font-size="10">Visual schedule board</text>
  <text x="137" y="240" text-anchor="middle" fill="#7f8c8d" font-size="10">Drag &amp; drop sequencing</text>
  <text x="137" y="260" text-anchor="middle" fill="#7f8c8d" font-size="10">Capacity visualization</text>
  <text x="137" y="280" text-anchor="middle" fill="#7f8c8d" font-size="10">Shift assignment</text>
  <text x="137" y="300" text-anchor="middle" fill="#7f8c8d" font-size="10">Work center allocation</text>

  <line x1="215" y1="245" x2="255" y2="245" stroke="#949ca1" stroke-width="2" marker-end="url(#aPp)"/>

  <rect x="260" y="175" width="155" height="140" rx="8" fill="rgba(46,204,113,0.12)" stroke="#2ecc71" stroke-width="1.5"/>
  <text x="337" y="200" text-anchor="middle" fill="#2ecc71" font-size="13" font-weight="bold">Order Queue</text>
  <text x="337" y="220" text-anchor="middle" fill="#a9dfbf" font-size="10">Tekuci (Current)</text>
  <text x="337" y="240" text-anchor="middle" fill="#a9dfbf" font-size="10">Otvoreni (Open)</text>
  <text x="337" y="260" text-anchor="middle" fill="#a9dfbf" font-size="10">Zatvoreni (Closed)</text>
  <text x="337" y="280" text-anchor="middle" fill="#a9dfbf" font-size="10">Zavrseni (Finished)</text>
  <text x="337" y="300" text-anchor="middle" fill="#7f8c8d" font-size="10">Per work station</text>

  <line x1="415" y1="245" x2="455" y2="245" stroke="#949ca1" stroke-width="2" marker-end="url(#aPp)"/>

  <!-- Execution box - with sensor auto-read highlight -->
  <rect x="460" y="175" width="155" height="140" rx="8" fill="rgba(46,204,113,0.12)" stroke="#2ecc71" stroke-width="1.5"/>
  <text x="537" y="200" text-anchor="middle" fill="#2ecc71" font-size="13" font-weight="bold">Execution</text>
  <text x="537" y="218" text-anchor="middle" fill="#a9dfbf" font-size="10">Active work order</text>
  <!-- Sensor qty highlight badge -->
  <rect x="471" y="222" width="132" height="17" rx="3" fill="rgba(242,46,13,0.2)" stroke="#f22e0d" stroke-width="0.8"/>
  <text x="537" y="234" text-anchor="middle" fill="#f22e0d" font-size="10" font-weight="bold">⚡ Qty auto-read (PLC/sensors)</text>
  <text x="537" y="252" text-anchor="middle" fill="#a9dfbf" font-size="10">Real-time tracking</text>
  <text x="537" y="270" text-anchor="middle" fill="#a9dfbf" font-size="10">Qty: 0/3235 PCE</text>
  <text x="537" y="288" text-anchor="middle" fill="#a9dfbf" font-size="10">A-class: 100%</text>
  <text x="537" y="306" text-anchor="middle" fill="#a9dfbf" font-size="10">Downtime: 115 min</text>

  <!-- Feedback box -->
  <rect x="660" y="175" width="110" height="140" rx="8" fill="rgba(78,85,89,0.12)" stroke="#4e5559" stroke-width="1.5"/>
  <text x="715" y="200" text-anchor="middle" fill="#4e5559" font-size="12" font-weight="bold">Feedback</text>
  <text x="715" y="225" text-anchor="middle" fill="#b0b5b9" font-size="10">Confirmations</text>
  <text x="715" y="245" text-anchor="middle" fill="#b0b5b9" font-size="10">Actual qty</text>
  <text x="715" y="265" text-anchor="middle" fill="#b0b5b9" font-size="10">Downtimes</text>
  <text x="715" y="285" text-anchor="middle" fill="#b0b5b9" font-size="10">Labor hours</text>
  <text x="715" y="305" text-anchor="middle" fill="#7f8c8d" font-size="10">-> Back to SAP</text>

  <line x1="615" y1="245" x2="655" y2="245" stroke="#4e5559" stroke-width="1.5" stroke-dasharray="4,3"/>

  <!-- Shop floor level -->
  <rect x="100" y="345" width="600" height="90" rx="8" fill="rgba(242,46,13,0.08)" stroke="rgba(242,46,13,0.3)" stroke-width="1"/>
  <text x="400" y="370" text-anchor="middle" fill="#f22e0d" font-size="13" font-weight="bold">Physical Shop Floor — PLCs &amp; Sensors</text>
  <text x="180" y="395" text-anchor="middle" fill="#ff6b52" font-size="11">PRS1-Presa</text>
  <text x="310" y="395" text-anchor="middle" fill="#ff6b52" font-size="11">Lamela Line</text>
  <text x="440" y="395" text-anchor="middle" fill="#ff6b52" font-size="11">Sorting Station</text>
  <text x="570" y="395" text-anchor="middle" fill="#ff6b52" font-size="11">Packaging</text>
  <text x="400" y="425" text-anchor="middle" fill="#7f8c8d" font-size="10">PBP400 -> PBP450 -> ... (Work center routing from SAP)</text>

  <!-- Arrows: InView down to shop floor -->
  <line x1="200" y1="315" x2="200" y2="340" stroke="#f22e0d" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="400" y1="315" x2="400" y2="340" stroke="#f22e0d" stroke-width="1" stroke-dasharray="3,3"/>

  <!-- Sensor data arrow: shop floor UP to Execution (actual quantities from PLCs) -->
  <line x1="537" y1="340" x2="537" y2="318" stroke="#f22e0d" stroke-width="2" marker-end="url(#aPpRed)"/>
  <rect x="546" y="323" width="75" height="14" rx="3" fill="#070707"/>
  <text x="583" y="333" fill="#f22e0d" font-size="9" font-weight="bold">actual qty ↑</text>
</svg>
